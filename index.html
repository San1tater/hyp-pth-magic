<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>哈利波特 · 魔法對決</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans TC','Segoe UI',sans-serif;background:#0a0a12;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}
        .container{width:100vw;height:100vh;max-width:100%;background:linear-gradient(160deg,#1a1025,#0f0a1a);border:2px solid #b8963a;padding:16px 20px;display:flex;flex-direction:column;overflow-y:auto}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-shrink:0}
        .header h1{font-family:'MedievalSharp',cursive;font-size:2.2rem;background:linear-gradient(180deg,#f5d98a,#c9a050);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px}
        .header h1 small{font-size:1rem;-webkit-text-fill-color:#b8963a;opacity:.7}
        .lang-switch{background:rgba(255,255,255,.06);border:1px solid rgba(184,150,58,.25);border-radius:30px;padding:4px 14px;color:#ddd0c0;font-size:.8rem;cursor:pointer;font-family:inherit;transition:.2s}
        .lang-switch:hover{border-color:#b8963a;background:rgba(184,150,58,.1)}
        .status-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border-radius:60px;padding:6px 16px;margin-bottom:12px;border:1px solid rgba(184,150,58,.15);flex-shrink:0;flex-wrap:wrap;gap:6px}
        .status-bar .stat{display:flex;align-items:center;gap:6px;color:#ddd0c0;font-size:.9rem}
        .status-bar .stat .value{font-weight:700;color:#f5d98a;font-size:1.1rem;min-width:20px}
        .status-bar .btn-start{background:linear-gradient(135deg,#b8963a,#8a6f2a);border:none;color:#1a1025;font-weight:700;padding:6px 24px;border-radius:40px;cursor:pointer;transition:.25s;font-family:inherit;font-size:.9rem}
        .status-bar .btn-start:hover{transform:scale(1.04);box-shadow:0 6px 25px rgba(184,150,58,.45)}
        .status-bar .btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .enemy-area{background:rgba(0,0,0,.5);border-radius:28px;padding:16px 20px 14px;margin-bottom:12px;border:1px solid rgba(184,150,58,.12);text-align:center;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:visible}
        .enemy-avatar-wrap{min-height:120px;display:flex;align-items:center;justify-content:center;width:100%;position:relative}
        .enemy-area .enemy-img{width:120px;height:120px;object-fit:contain;filter:drop-shadow(0 0 40px rgba(184,150,58,.15));transition:transform .3s;max-width:100%}
        .enemy-area .enemy-img:hover{transform:scale(1.05)}
        .enemy-area .enemy-name{font-size:1.6rem;font-weight:700;color:#f5d98a;margin:2px 0 0}
        .enemy-area .enemy-status{font-size:.9rem;color:#b0a090}
        .enemy-area .enemy-hint{font-size:.75rem;color:#806850;margin-top:2px}
        .enemy-area .empty-hint{color:#706050;font-size:1.1rem;opacity:.5;letter-spacing:2px}
        .hp-bar-wrap{width:100%;max-width:300px;height:14px;background:rgba(60,20,20,.7);border-radius:20px;margin:8px auto 2px;overflow:hidden;border:1px solid rgba(184,150,58,.15);position:relative}
        .hp-bar-fill{height:100%;width:100%;background:linear-gradient(90deg,#e04040,#f08060);border-radius:20px;transition:width .45s ease;position:relative}
        .hp-bar-fill.low{background:linear-gradient(90deg,#c02020,#e05050)}
        .hp-bar-fill.mid{background:linear-gradient(90deg,#d08030,#f0a050)}
        .hp-bar-fill.high{background:linear-gradient(90deg,#40a060,#60d080)}
        .hp-text{font-size:.7rem;color:#ddd0c0;opacity:.7;letter-spacing:1px;margin-top:2px}
        .damage-float{position:absolute;top:5%;left:50%;transform:translateX(-50%);font-size:4rem;font-weight:900;pointer-events:none;opacity:0;z-index:999;text-shadow:0 0 40px rgba(255,60,60,.8),0 4px 30px rgba(0,0,0,.9);animation:floatUp 1.4s ease-out forwards;color:#ff3333;font-family:'Impact','Arial Black',sans-serif}
        .damage-float.heal{color:#60e090;text-shadow:0 0 40px rgba(60,220,120,.6),0 4px 30px rgba(0,0,0,.9)}
        .damage-float.critical{color:#ffd700;font-size:5rem;text-shadow:0 0 60px rgba(255,215,0,.8),0 4px 30px rgba(0,0,0,.9)}
        .damage-float.ineffective{color:#8888aa;font-size:2.8rem;text-shadow:0 0 30px rgba(136,136,170,.4),0 4px 20px rgba(0,0,0,.8)}
        @keyframes floatUp{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(.6)}30%{opacity:1;transform:translateX(-50%) translateY(-40px) scale(1.2)}100%{opacity:0;transform:translateX(-50%) translateY(-160px) scale(1)}}
        .positions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;flex-shrink:0}
        .positions .pos-btn{background:rgba(255,255,255,.04);border:1.5px solid rgba(184,150,58,.2);border-radius:20px;padding:10px 4px;cursor:pointer;transition:.25s;text-align:center;color:#ddd0c0;font-family:inherit;font-size:.8rem;backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;user-select:none}
        .positions .pos-btn .pos-icon{font-size:2rem}
        .positions .pos-btn .pos-label{font-weight:400;font-size:.75rem;color:#c0b0a0}
        .positions .pos-btn:hover:not(:disabled){background:rgba(184,150,58,.12);border-color:#b8963a;transform:translateY(-2px)}
        .positions .pos-btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
        .positions .pos-btn.active{background:rgba(184,150,58,.18);border-color:#f5d98a;box-shadow:0 0 30px rgba(184,150,58,.08)}
        .positions .pos-btn.defense{border-color:rgba(80,180,200,.3);background:rgba(80,180,200,.06)}
        .positions .pos-btn.defense:hover:not(:disabled){border-color:#60c8e0;background:rgba(80,180,200,.15)}
        .positions .pos-btn.defense.active{border-color:#80d8f0;background:rgba(80,180,200,.2)}
        .spell-display{background:rgba(0,0,0,.45);border-radius:20px;padding:10px 16px;margin-bottom:10px;border:1px solid rgba(184,150,58,.1);min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
        .spell-display .spell-char{font-size:1.8rem;font-weight:700;color:#f5d98a;letter-spacing:6px}
        .spell-display .spell-pinyin{font-size:.95rem;color:#c0b0a0;letter-spacing:3px;opacity:.7}
        .spell-display .spell-hint{font-size:.7rem;color:#806850}
        .spell-display .spell-empty{color:#605040;font-size:.85rem;opacity:.5}
        .action-row{display:flex;gap:12px;margin-bottom:12px;flex-shrink:0;flex-wrap:wrap}
        .action-row .btn-record{flex:1;min-width:120px;background:linear-gradient(135deg,#8a3a4a,#5a2a3a);border:1px solid rgba(200,100,120,.3);border-radius:60px;padding:12px 16px;font-size:1rem;font-weight:700;color:#f5e0d0;cursor:pointer;transition:.25s;font-family:inherit;letter-spacing:2px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(138,58,74,.2)}
        .action-row .btn-record:hover:not(:disabled){transform:scale(1.02);border-color:rgba(220,140,160,.4)}
        .action-row .btn-record:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
        .action-row .btn-record.recording{background:linear-gradient(135deg,#c04040,#802020);animation:pulse 1s infinite;border-color:#ff6060}
        @keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(200,60,60,.3)}50%{box-shadow:0 0 50px rgba(200,60,60,.6)}}
        .action-row .feedback{flex:1.2;min-width:100px;padding:8px 14px;border-radius:16px;background:rgba(0,0,0,.3);color:#ddd0c0;font-size:.85rem;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.04);word-break:break-word}
        .action-row .feedback.success{color:#7ddfa0;border-color:rgba(100,220,150,.2);background:rgba(60,180,100,.08)}
        .action-row .feedback.fail{color:#ef8a8a;border-color:rgba(220,100,100,.2);background:rgba(180,60,60,.08)}
        .action-row .feedback.info{color:#b0c8e8;border-color:rgba(100,150,220,.15);background:rgba(60,100,180,.06)}
        .action-row .feedback.warn{color:#f0d080;border-color:rgba(220,200,80,.15);background:rgba(180,160,60,.06)}
        @media(max-width:480px){.header h1{font-size:1.6rem}.header h1 small{font-size:.7rem}.positions{grid-template-columns:repeat(4,1fr);gap:5px}.positions .pos-btn{padding:8px 2px;font-size:.7rem}.positions .pos-btn .pos-icon{font-size:1.6rem}.status-bar{font-size:.7rem;padding:4px 12px}.action-row{flex-direction:column}.action-row .btn-record{width:100%;min-width:unset}.action-row .feedback{width:100%;min-height:36px;font-size:.8rem}.enemy-area .enemy-img{width:80px;height:80px}.enemy-area .enemy-name{font-size:1.3rem}.enemy-area{min-height:160px;padding:12px 14px}.enemy-avatar-wrap{min-height:80px}.spell-display .spell-char{font-size:1.4rem}.hp-bar-wrap{max-width:200px;height:10px}.damage-float{font-size:3rem}.damage-float.critical{font-size:3.8rem}}
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header"><h1>⚡ 哈利波特 <small>魔法對決</small></h1><button class="lang-switch" id="langToggle">EN / 中</button></div>
    <div class="status-bar">
        <div class="stat"><span>🏆</span><span id="scoreLabel">分數</span><span class="value" id="scoreDisplay">0</span></div>
        <div class="stat"><span>❤️</span><span id="livesLabel">生命</span><span class="value" id="livesDisplay">3</span></div>
        <button class="btn-start" id="btnStart">開始冒險</button>
    </div>
    <div class="enemy-area" id="enemyArea"><div class="empty-hint">🪄 點擊「開始冒險」迎接挑戰</div></div>
    <div class="positions">
        <button class="pos-btn" data-pos="wand" id="posWand" disabled><span class="pos-icon">🪄</span><span class="pos-label" id="labelWand">魔杖</span></button>
        <button class="pos-btn" data-pos="body" id="posBody" disabled><span class="pos-icon">🧍</span><span class="pos-label" id="labelBody">身體</span></button>
        <button class="pos-btn" data-pos="forehead" id="posForehead" disabled><span class="pos-icon">👁</span><span class="pos-label" id="labelForehead">額頭</span></button>
        <button class="pos-btn defense" data-pos="defense" id="posDefense" disabled><span class="pos-icon">🛡️</span><span class="pos-label" id="labelDefense">自衛</span></button>
    </div>
    <div class="spell-display" id="spellDisplay"><div class="spell-empty" id="spellEmpty">🔮 選擇一個部位以顯示咒語</div></div>
    <div class="action-row">
        <button class="btn-record" id="btnRecord" disabled><span>🎤</span><span id="recordLabel">開始唸咒</span></button>
        <div class="feedback" id="feedbackDisplay">💬 等待你的行動…</div>
    </div>
</div>
<script>
(function(){
'use strict';

const LANG={
zh:{score:'分數',lives:'生命',start:'開始冒險',enemy_default:'🪄 點擊「開始冒險」迎接挑戰',
wand:'魔杖',body:'身體',forehead:'額頭',defense:'自衛',spell_empty:'🔮 選擇一個部位以顯示咒語',
record:'開始唸咒',recording:'停止錄音',feedback_wait:'💬 等待你的行動…',feedback_encounter:'⚔️ 遭遇了 {name}！選擇咒語！',
feedback_spell_ready:'🔮 準備唸出「{spell}」',feedback_listening:'🎤 錄音中，再次點擊按鈕停止…',
feedback_score:'📊 評分（百分制）：{score} 分',feedback_fail:'❌ 錯誤: {err}',feedback_weak:'⚠️ 「{spell}」效果微弱！',
feedback_dodge:'🌀 成功閃避反擊！再試一次！',feedback_dodge_fail:'💥 閃避失敗，遭受反擊！',
feedback_ineffective:'💔 「{spell}」對 {enemy} 無效！',feedback_overkill:'🔥 「{spell}」過度強大！不被鼓勵！',
feedback_overkill_penalty:'⚖️ 濫用強大咒語，扣除 5 分。',feedback_hit:'💀 反擊命中！剩餘生命：{lives}',
feedback_gameover:'💀 你倒下了… 點擊「開始冒險」重來',feedback_retry:'🔄 繼續挑戰 {name}，選擇咒語！',
feedback_restart:'🔄 遊戲重啟！',feedback_victory:'🎉 成功擊敗 {name}！ +{score} 分{bonus}',
bonus_perfect:' 🌟 完美咒語！額外 +5 分！',bonus_great:' ✨ 出色的咒語！額外 +2 分！',
feedback_next:'⚔️ 準備迎接下一場戰鬥！',enemy_status_default:'現身',
enemy_status_expelliarmus:'被除你武器',enemy_status_stupefy:'被昏昏倒地',
enemy_status_petrificus:'被統統石化',enemy_status_patronus:'被呼神護衛',
enemy_status_attacking:'攻擊！',enemy_status_defeated:'被擊敗',
feedback_stopping:'⏹️ 錄音停止，正在傳送評測…',feedback_connecting:'📡 連線訊飛伺服器中…',hp_label:'生命值',
feedback_too_short:'⏱️ 錄音太短（<0.3秒），請唸完整咒語後重試。',feedback_retry_please:'🔄 請重新嘗試唸咒。'},
en:{score:'Score',lives:'Lives',start:'Start',enemy_default:'🪄 Click "Start" to begin',
wand:'Wand',body:'Body',forehead:'Forehead',defense:'Defense',spell_empty:'🔮 Select a body part',
record:'Record',recording:'Stop',feedback_wait:'💬 Awaiting action…',feedback_encounter:'⚔️ Encountered {name}! Choose a spell!',
feedback_spell_ready:'🔮 Ready to cast "{spell}"',feedback_listening:'🎤 Recording… click again to stop',
feedback_score:'📊 Score (0-100): {score}',feedback_fail:'❌ Error: {err}',feedback_weak:'⚠️ "{spell}" weak effect!',
feedback_dodge:'Dodged counterattack! Try again!',feedback_dodge_fail:'💥 Failed to dodge!',
feedback_ineffective:'💔 "{spell}" no effect on {enemy}!',feedback_overkill:'🔥 "{spell}" overkill! Not encouraged!',
feedback_overkill_penalty:'⚖️ Penalty -5 points.',feedback_hit:'💀 Hit! Lives left: {lives}',
feedback_gameover:'💀 You fell… Click "Start" to restart',feedback_retry:'🔄 Continue fighting {name}, choose a spell!',
feedback_restart:'🔄 Game restarted!',feedback_victory:'🎉 Defeated {name}! +{score} pts{bonus}',
bonus_perfect:' 🌟 Perfect! Extra +5 pts!',bonus_great:' ✨ Great! Extra +2 pts!',
feedback_next:'⚔️ Next battle!',enemy_status_default:'Appeared',
enemy_status_expelliarmus:'Disarmed',enemy_status_stupefy:'Stunned',
enemy_status_petrificus:'Petrified',enemy_status_patronus:'Patronus',
enemy_status_attacking:'Attacking!',enemy_status_defeated:'Defeated',
feedback_stopping:'⏹️ Recording stopped, sending for evaluation…',feedback_connecting:'📡 Connecting to evaluation server…',hp_label:'HP',
feedback_too_short:'⏱️ Recording too short (<0.3s), please speak clearly and retry.',feedback_retry_please:'🔄 Please retry the spell.'}
};
let lang='zh';
function t(k,p){let s=LANG[lang][k]||k;if(p)for(let k in p)s=s.replace(new RegExp('\\{'+k+'\\}','g'),p[k]);return s;}

const ENEMIES=[
{id:'dementor',name_zh:'攝魂怪',name_en:'Dementor',emoji:'👻',desc_zh:'黑暗化身',desc_en:'Darkness',hint_zh:'守護之力',hint_en:'Patronus',hp:60},
{id:'voldemort',name_zh:'伏地魔',name_en:'Voldemort',emoji:'🐍',desc_zh:'黑魔王',desc_en:'Dark Lord',hint_zh:'解除武器',hint_en:'Disarm',hp:60},
{id:'malfoy',name_zh:'馬爾福',name_en:'Malfoy',emoji:'🧙‍♂️',desc_zh:'食死徒',desc_en:'Death Eater',hint_zh:'冷靜',hint_en:'Calm',hp:60}
];
const SPELLS={
'除你武器':{pinyin:'ch u 2 n i 3 u 3 q i 4',pos:'wand',label_zh:'魔杖',label_en:'Wand',effects:{dementor:'ineffective',voldemort:'effective',malfoy:'weak'},desc_zh:'繳械咒',desc_en:'Disarm'},
'統統石化':{pinyin:'t ong 1 t ong 1 sh i 2 h ua 4',pos:'body',label_zh:'身體',label_en:'Body',effects:{dementor:'ineffective',voldemort:'ineffective',malfoy:'overkill'},desc_zh:'束縛咒',desc_en:'Petrify'},
'昏昏倒地':{pinyin:'h un 1 h un 1 d ao 3 d i 4',pos:'forehead',label_zh:'額頭',label_en:'Forehead',effects:{dementor:'weak',voldemort:'weak',malfoy:'effective'},desc_zh:'昏迷咒',desc_en:'Stun'},
'呼神護衛':{pinyin:'h u 1 sh en 2 h u 4 ui 4',pos:'defense',label_zh:'自衛',label_en:'Defense',effects:{dementor:'effective',voldemort:'ineffective',malfoy:'ineffective'},desc_zh:'守護咒',desc_en:'Patronus'}
};
const POS_TO_SPELL={wand:'除你武器',body:'統統石化',forehead:'昏昏倒地',defense:'呼神護衛'};

const state={
score:0,lives:3,currentEnemy:null,currentSpellKey:null,isRecording:false,
battleLocked:false,enemyDefeated:false,enemyHp:0,maxEnemyHp:60,enemyStatus:'default',
xfAppid:'2600b137',xfApiKey:'8b012124ed213c06974cd469f29e134b',xfSecret:'MWNkZTQ1ZTEzOTM0NTVjZThjOTQxNjZj',
audioContext:null,processor:null,source:null,stream:null,pcmChunks:[],isCapturing:false,evaluating:false
};

const $=id=>document.getElementById(id);
const dom={
score:$('scoreDisplay'),lives:$('livesDisplay'),scoreLabel:$('scoreLabel'),livesLabel:$('livesLabel'),
enemyArea:$('enemyArea'),btnStart:$('btnStart'),posWand:$('posWand'),posBody:$('posBody'),
posForehead:$('posForehead'),posDefense:$('posDefense'),spellDisplay:$('spellDisplay'),
btnRecord:$('btnRecord'),recordLabel:$('recordLabel'),feedback:$('feedbackDisplay'),
langToggle:$('langToggle'),labelWand:$('labelWand'),labelBody:$('labelBody'),
labelForehead:$('labelForehead'),labelDefense:$('labelDefense')
};
const posBtns=[dom.posWand,dom.posBody,dom.posForehead,dom.posDefense];
const posMap={wand:dom.posWand,body:dom.posBody,forehead:dom.posForehead,defense:dom.posDefense};

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[rand(0,a.length-1)];}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function getEnemyName(e){return lang==='zh'?e.name_zh:e.name_en;}
function getEnemyDesc(e){return lang==='zh'?e.desc_zh:e.desc_en;}
function getEnemyHint(e){return lang==='zh'?e.hint_zh:e.hint_en;}
function getSpellDesc(k){let s=SPELLS[k];return lang==='zh'?s.desc_zh:s.desc_en;}
function getSpellEffect(k,eid){let s=SPELLS[k];return s?(s.effects[eid]||'ineffective'):'ineffective';}

function setFeedback(msg,type='info'){dom.feedback.textContent=msg;dom.feedback.className='feedback '+type;}
function setSpellDisplay(ch,pinyin,hint){if(!ch){dom.spellDisplay.innerHTML=`<div class="spell-empty">${t('spell_empty')}</div>`;return;}dom.spellDisplay.innerHTML=`<div class="spell-char">${ch}</div><div class="spell-pinyin">${pinyin}</div>`+(hint?`<div class="spell-hint">${hint}</div>`:'');}

function renderEnemy(){
 const area=dom.enemyArea;
 if(!state.currentEnemy){area.innerHTML=`<div class="empty-hint">${t('enemy_default')}</div>`;return;}
 const e=state.currentEnemy;const name=getEnemyName(e);const desc=getEnemyDesc(e);const hint=getEnemyHint(e);
 const statusMap={default:0,expelliarmus:1,stupefy:2,petrificus:3,patronus:4,attacking:5,defeated:6};
 const imgSrc=`images/${e.id}_${statusMap[state.enemyStatus]||0}.png`;
 const hpPercent=Math.max(0,Math.min(100,(state.enemyHp/state.maxEnemyHp)*100));
 let hpClass='high';if(hpPercent<25)hpClass='low';else if(hpPercent<55)hpClass='mid';
 area.innerHTML=`
 <div class="enemy-avatar-wrap" id="enemyAvatarWrap">
  <img class="enemy-img" src="${imgSrc}" alt="${name}" onerror="this.style.display='none';document.getElementById('fallback-emoji-${e.id}').style.display='block';">
  <span id="fallback-emoji-${e.id}" style="font-size:4rem;display:none;">${e.emoji}</span>
 </div>
 <div class="enemy-name">${name}</div>
 <div class="enemy-status">${t('enemy_status_'+state.enemyStatus)||t('enemy_status_default')} · ${desc}</div>
 <div class="enemy-hint">${hint}</div>
 <div class="hp-bar-wrap"><div class="hp-bar-fill ${hpClass}" style="width:${hpPercent}%;"></div></div>
 <div class="hp-text">${t('hp_label')} ${state.enemyHp} / ${state.maxEnemyHp}</div>`;
}

function showDamageFloat(amt, critical=false, heal=false, ineffective=false){
 const wrap=document.getElementById('enemyAvatarWrap');
 if(!wrap){
  setTimeout(()=>showDamageFloat(amt,critical,heal,ineffective),150);
  return;
 }
 const el=document.createElement('div');
 el.className='damage-float';
 if(heal)el.classList.add('heal');
 else if(critical)el.classList.add('critical');
 else if(ineffective)el.classList.add('ineffective');
 const sign=heal?'+':'-';
 el.textContent=`${sign}${Math.abs(amt)}`;
 wrap.appendChild(el);
 setTimeout(()=>{if(el.parentNode)el.remove();},1500);
}

function setEnemyStatus(s){state.enemyStatus=s;renderEnemy();}

function updateUI(){
 dom.score.textContent=state.score;dom.lives.textContent=state.lives;
 dom.scoreLabel.textContent=t('score');dom.livesLabel.textContent=t('lives');
 dom.btnStart.textContent=t('start');dom.recordLabel.textContent=state.isRecording?t('recording'):t('record');
 dom.labelWand.textContent=t('wand');dom.labelBody.textContent=t('body');dom.labelForehead.textContent=t('forehead');dom.labelDefense.textContent=t('defense');
 renderEnemy();
 const hasEnemy=!!state.currentEnemy&&!state.battleLocked&&!state.enemyDefeated;
 const recEval=state.isRecording||state.evaluating;
 posBtns.forEach(b=>b.disabled=!hasEnemy||recEval);
 dom.btnRecord.disabled=!state.currentEnemy||!state.currentSpellKey||state.battleLocked||state.enemyDefeated||state.lives<=0||state.evaluating;
 dom.btnStart.disabled=state.isRecording||state.battleLocked||state.evaluating;
 if(state.lives<=0){posBtns.forEach(b=>b.disabled=true);dom.btnRecord.disabled=true;dom.btnStart.disabled=false;}
 dom.langToggle.textContent=lang==='zh'?'EN / 中':'中 / EN';
}

async function buildWsUrl(apiKey,apiSecret,appid){
 const host='ise-api.xfyun.cn',path='/v2/open-ise',date=new Date().toUTCString();
 const signStr='host: '+host+'\n'+'date: '+date+'\n'+'GET '+path+' HTTP/1.1';
 const encoder=new TextEncoder();
 const keyData=encoder.encode(apiSecret),msgData=encoder.encode(signStr);
 const cryptoKey=await crypto.subtle.importKey('raw',keyData,{name:'HMAC',hash:'SHA-256'},false,['sign']);
 const sigBuffer=await crypto.subtle.sign('HMAC',cryptoKey,msgData);
 const signature=btoa(String.fromCharCode(...new Uint8Array(sigBuffer)));
 const authOrigin='api_key="'+apiKey+'", algorithm="hmac-sha256", headers="host date request-line", signature="'+signature+'"';
 return 'wss://'+host+path+'?authorization='+encodeURIComponent(btoa(authOrigin))+'&date='+encodeURIComponent(date)+'&host='+encodeURIComponent(host);
}

// ---------- 錄音 ----------
function startPCMCapture(){
 return new Promise((resolve,reject)=>{
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}})
  .then(stream=>{
   const AudioCtx=window.AudioContext||window.webkitAudioContext;
   state.audioContext=new AudioCtx();
   const inRate=state.audioContext.sampleRate;
   console.log('🎤 實際採樣率:',inRate);
   const source=state.audioContext.createMediaStreamSource(stream);
   const processor=state.audioContext.createScriptProcessor(2048,1,1);
   state.pcmChunks=[];
   processor.onaudioprocess=(e)=>{
    const input=e.inputBuffer.getChannelData(0);
    const targetRate=16000;
    const ratio=inRate/targetRate;
    const outLen=Math.floor(input.length/ratio);
    const pcm=new Int16Array(outLen);
    for(let i=0;i<outLen;i++){
     const srcIdx=i*ratio;
     const idx0=Math.floor(srcIdx);
     const frac=srcIdx-idx0;
     let sample;
     if(idx0+1<input.length){
      sample=input[idx0]*(1-frac)+input[idx0+1]*frac;
     }else{
      sample=input[idx0]||0;
     }
     pcm[i]=Math.round(Math.max(-1,Math.min(1,sample))*32767);
    }
    state.pcmChunks.push(pcm);
   };
   source.connect(processor);processor.connect(state.audioContext.destination);
   state.source=source;state.processor=processor;state.stream=stream;state.isCapturing=true;
   resolve();
  }).catch(err=>reject(new Error('麥克風權限被拒絕: '+err.message)));
 });
}
function stopPCMCapture(){
 return new Promise((resolve)=>{
  if(state.audioContext){
   state.source.disconnect();state.processor.disconnect();state.stream.getTracks().forEach(t=>t.stop());
   state.audioContext.close();state.isCapturing=false;
   let total=state.pcmChunks.reduce((a,b)=>a+b.length,0);
   let combined=new Int16Array(total);
   let offset=0;for(let arr of state.pcmChunks){combined.set(arr,offset);offset+=arr.length;}
   resolve(combined.buffer);
  }else{resolve(new Int16Array(0).buffer);}
 });
}

// ===== 讯飞评测（支持重试，错误48195时返回特殊标志） =====
function evaluateWithXunfei(pcmBuffer,appid,apiKey,apiSecret,spellKey,spellText,retry=false){
 return new Promise((resolve,reject)=>{
  let ws=null,resolved=false,ssbConfirmed=false;
  let timeoutId=setTimeout(()=>{
   if(!resolved){if(ws && ws.readyState===WebSocket.OPEN)ws.close();reject(new Error('連線逾時'));}
  },15000);

  (async function(){
   try{
    const url=await buildWsUrl(apiKey,apiSecret,appid);
    console.log('🔗 連線 URL:',url);
    ws=new WebSocket(url);

    ws.onopen=()=>{
     console.log('✅ WebSocket 已連線');
     // 选择题型：除你武器和呼神護衛优先用 read_sentence，其他用 read_word
     let category = 'read_word';
     if (spellKey === '除你武器' || spellKey === '呼神護衛') {
       category = 'read_sentence';
     }
     // 若重试则改用 read_word（部分词可能 sentence 不行）
     if(retry && (spellKey === '除你武器' || spellKey === '呼神護衛')){
       category = 'read_word';
     }
     const pinyinStr = SPELLS[spellKey].pinyin;
     const paper = '<customizer:interphonic>\n' + spellText + ' ' + pinyinStr;
     console.log('📝 發送試卷 (category: '+category+'):\n', paper);
     const ssb={
      common:{app_id:appid},
      business:{
       category:category,
       language:'zh_cn',
       sub:'ise',
       ent:'cn_vip',
       tte:'utf-8',
       cmd:'ssb',
       auf:'audio/L16;rate=16000',
       aue:'raw',
       text:paper,
       ttp_skip:true,
       rst:'entirety',
       ise_unite:'1',
       extra_ability:'multi_dimension'
      },
      data:{status:0,data:''}
     };
     ws.send(JSON.stringify(ssb));
     console.log('📤 ssb 已發送');
    };

    ws.onmessage=(ev)=>{
     try{
      const msg=JSON.parse(ev.data);
      console.log('📩 收到:',msg);
      if(msg.code!==0){
       if(!resolved){
        resolved=true;clearTimeout(timeoutId);ws.close();
        // 如果是48195且未重试，则发起重试（切换题型）
        if(msg.code===48195 && !retry && (spellKey==='除你武器'||spellKey==='呼神護衛')){
         console.warn('⚠️ 48195錯誤，切換題型重試...');
         // 重新调用，标记为重试
         evaluateWithXunfei(pcmBuffer,appid,apiKey,apiSecret,spellKey,spellText,true)
          .then(score=>resolve(score))
          .catch(err=>reject(err));
        } else {
         reject(new Error('訊飛錯誤 '+msg.code+': '+msg.message));
        }
       }
       return;
      }
      if(!ssbConfirmed && (!msg.data||!msg.data.data)){
       ssbConfirmed=true;
       console.log('✅ ssb 確認，開始發送音頻');
       const total=pcmBuffer.byteLength;
       if(total===0){if(!resolved){resolved=true;ws.close();reject(new Error('空音頻'));}return;}
       const chunkSize=640;
       let offset=0,frameCount=0;
       const sendNext=()=>{
        if(ws.readyState!==WebSocket.OPEN){
         console.warn('⚠️ 連線中斷，停止發送');
         if(!resolved){resolved=true;clearTimeout(timeoutId);reject(new Error('連線中斷'));}
         return;
        }
        if(offset>=total){
         console.log('📤 音頻發送完畢，幀數:',frameCount);
         return;
        }
        const end=Math.min(offset+chunkSize,total);
        const chunk=pcmBuffer.slice(offset,end);
        const isFirst=(frameCount===0),isLast=(end===total);
        const aus=isFirst?1:(isLast?4:2);
        const frame={business:{cmd:'auw',aus:aus,aue:'raw'},data:{status:isLast?2:1,data:btoa(String.fromCharCode(...new Uint8Array(chunk)))}};
        ws.send(JSON.stringify(frame));
        frameCount++;offset=end;
        setTimeout(sendNext,30);
       };
       sendNext();
       return;
      }
      if(msg.data && msg.data.data){
       const xmlStr=atob(msg.data.data);
       console.log('📄 XML 完整內容:\n', xmlStr);

       let parser=new DOMParser();
       let xmlDoc=parser.parseFromString(xmlStr,'text/xml');
       let root=xmlDoc.querySelector('read_word') || xmlDoc.querySelector('sentence') || xmlDoc.querySelector('read_sentence');
       let phoneScore=null, toneScore=null, totalScore=null;

       if(root){
        phoneScore = parseFloat(root.getAttribute('phone_score'));
        toneScore = parseFloat(root.getAttribute('tone_score'));
        totalScore = parseFloat(root.getAttribute('total_score'));
        console.log('📊 解析根節點:', {phoneScore, toneScore, totalScore});
       }

       if(isNaN(phoneScore) || isNaN(toneScore)){
        console.warn('⚠️ 從 DOM 獲取失敗，使用正則提取');
        const phoneMatch = xmlStr.match(/phone_score="([\d.]+)"/);
        const toneMatch = xmlStr.match(/tone_score="([\d.]+)"/);
        const totalMatch = xmlStr.match(/total_score="([\d.]+)"/);
        if(phoneMatch) phoneScore = parseFloat(phoneMatch[1]);
        if(toneMatch) toneScore = parseFloat(toneMatch[1]);
        if(totalMatch) totalScore = parseFloat(totalMatch[1]);
        console.log('📊 正則提取:', {phoneScore, toneScore, totalScore});
       }

       let rawScore = 0;
       if(!isNaN(phoneScore) && !isNaN(toneScore)){
        rawScore = (phoneScore + toneScore) / 2;
        console.log(`✅ 使用 phone+tone 平均: ${rawScore.toFixed(2)}`);
       } else if(!isNaN(totalScore)){
        rawScore = totalScore;
        console.log(`⚠️ 使用 total_score: ${rawScore}`);
       } else {
        const altMatch = xmlStr.match(/total_score="([\d.]+)"/);
        if(altMatch){
         rawScore = parseFloat(altMatch[1]);
         console.warn(`⚠️ 從 total_score 回退: ${rawScore}`);
        } else {
         rawScore = 0;
         console.warn('❌ 無可用評分字段');
        }
       }
       let finalScore = Math.round(rawScore * 10);
       finalScore = Math.max(0, Math.min(100, finalScore));
       console.log(`🎯 最終百分制評分: ${finalScore}`);
       if(!resolved){resolved=true;clearTimeout(timeoutId);ws.close();resolve(finalScore);}
      }
     }catch(e){if(!resolved){resolved=true;clearTimeout(timeoutId);ws.close();reject(e);}}
    };
    ws.onerror=(err)=>{
     if(!resolved){resolved=true;clearTimeout(timeoutId);ws.close();reject(new Error('WebSocket 錯誤'));}
    };
    ws.onclose=(ev)=>{
     if(!resolved){resolved=true;clearTimeout(timeoutId);
      reject(new Error('連線關閉 (code:'+ev.code+')'));
     }
    };
   }catch(e){if(!resolved){resolved=true;clearTimeout(timeoutId);if(ws)ws.close();reject(e);}}
  })();
 });
}

// ============ 遊戲邏輯 ============
function startAdventure(){
 if(state.lives<=0){
  state.lives=3;
  state.score=0;
  state.battleLocked=false;
  state.enemyDefeated=false;
  state.currentEnemy=null;
  state.currentSpellKey=null;
  state.enemyHp=0;
  state.maxEnemyHp=60;
  state.enemyStatus='default';
  setSpellDisplay(null);
  posBtns.forEach(b=>b.classList.remove('active'));
  setFeedback(t('feedback_restart'),'info');
  updateUI();
  state.battleLocked=false;
  state.enemyDefeated=false;
  dom.btnStart.disabled=false;
 }
 if(state.battleLocked||state.isRecording||state.evaluating)return;
 const enemy=pick(ENEMIES);
 state.currentEnemy=enemy;
 state.currentSpellKey=null;
 state.enemyDefeated=false;
 state.battleLocked=false;
 state.enemyStatus='default';
 state.enemyHp=enemy.hp;
 state.maxEnemyHp=enemy.hp;
 setSpellDisplay(null);
 setFeedback(t('feedback_encounter',{name:getEnemyName(enemy)}),'info');
 posBtns.forEach(b=>b.classList.remove('active'));
 updateUI();
 posBtns.forEach(b=>b.disabled=false);
 dom.btnRecord.disabled=true;
 setEnemyStatus('default');
}

function selectPosition(posKey){
 if(!state.currentEnemy||state.battleLocked||state.isRecording||state.enemyDefeated||state.evaluating)return;
 const spellKey=POS_TO_SPELL[posKey];if(!spellKey)return;
 state.currentSpellKey=spellKey;posBtns.forEach(b=>b.classList.remove('active'));const btn=posMap[posKey];if(btn)btn.classList.add('active');
 setSpellDisplay(spellKey,SPELLS[spellKey].pinyin.replace(/\|/g,'|'),'「'+getSpellDesc(spellKey)+'」');
 setFeedback(t('feedback_spell_ready',{spell:spellKey}),'info');dom.btnRecord.disabled=false;updateUI();
}

async function handleRecord(){
 if(!state.currentEnemy||!state.currentSpellKey||state.battleLocked||state.enemyDefeated||state.evaluating)return;
 const spellKey=state.currentSpellKey,enemy=state.currentEnemy;
 if(!state.isRecording){
  state.isRecording=true;dom.btnRecord.classList.add('recording');dom.recordLabel.textContent=t('recording');
  setFeedback(t('feedback_listening'),'info');updateUI();
  try{await startPCMCapture();}catch(err){setFeedback(t('feedback_fail',{err:err.message}),'fail');state.isRecording=false;dom.btnRecord.classList.remove('recording');dom.recordLabel.textContent=t('record');updateUI();}
 }else{
  dom.btnRecord.disabled=true;setFeedback(t('feedback_stopping'),'info');state.isRecording=false;dom.btnRecord.classList.remove('recording');dom.recordLabel.textContent=t('record');updateUI();
  let pcmBuffer;
  try{pcmBuffer=await stopPCMCapture();}catch(err){setFeedback(t('feedback_fail',{err:err.message}),'fail');dom.btnRecord.disabled=false;updateUI();return;}
  if(pcmBuffer.byteLength===0){setFeedback('❌ 未錄到音頻，請重新嘗試','fail');dom.btnRecord.disabled=false;updateUI();return;}
  // 检查录音时长（至少0.3秒，即 16000*0.3=4800 个样本）
  const sampleCount = pcmBuffer.byteLength / 2; // 16-bit
  if(sampleCount < 4800){
   setFeedback(t('feedback_too_short'),'warn');
   dom.btnRecord.disabled=false;
   updateUI();
   return;
  }
  state.evaluating=true;posBtns.forEach(b=>b.disabled=true);dom.btnRecord.disabled=true;setFeedback(t('feedback_connecting'),'info');updateUI();
  try{
   const score=await evaluateWithXunfei(pcmBuffer,state.xfAppid,state.xfApiKey,state.xfSecret,spellKey,spellKey);
   setFeedback(t('feedback_score',{score:score}),'info');
   const effect=getSpellEffect(spellKey,enemy.id);
   await handleBattleResult(effect,spellKey,enemy,score);
  }catch(err){
   console.error('❌ 評測錯誤:',err);
   // 如果是48195，提示用户重试（不触发反击）
   if(err.message && err.message.includes('48195')){
    setFeedback('⚠️ 該咒語評測暫時不可用，請換一個咒語或重新嘗試。','warn');
    // 重置战斗状态，不扣血，允许重新选择
    state.battleLocked=false;
    state.currentSpellKey=null;
    setSpellDisplay(null);
    posBtns.forEach(b=>b.classList.remove('active'));
    updateUI();
    posBtns.forEach(b=>b.disabled=false);
    dom.btnRecord.disabled=true;
   } else {
    setFeedback(t('feedback_fail',{err:err.message}),'fail');
    await handleCounterAttack();
   }
  }finally{
   state.evaluating=false;
   if(!state.battleLocked&&!state.enemyDefeated&&state.lives>0){
    posBtns.forEach(b=>b.disabled=false);
    dom.btnRecord.disabled=!state.currentSpellKey;
   }
   updateUI();
  }
 }
}

async function handleBattleResult(effect,spellKey,enemy,score){
 state.battleLocked=true;let damage=0,isKill=false,bonusMsg='',bonusPts=0,isCritical=false;
 switch(effect){
  case 'effective':damage=Math.round(score);if(damage>=60){isKill=true;isCritical=true;bonusPts=(score>=90?5:(score>=75?2:0));bonusMsg=bonusPts>0?(score>=90?t('bonus_perfect'):t('bonus_great')):'';}break;
  case 'weak':damage=Math.round(score*0.5);break;
  case 'ineffective':damage=0;break;
  case 'overkill':damage=Math.round(score*5);state.score=Math.max(0,state.score-5);setFeedback(t('feedback_overkill_penalty'),'warn');break;
 }
 const hpLost=Math.min(damage,state.enemyHp);
 state.score=Math.max(0,state.score); // 防止分數變成負數
 state.enemyHp=Math.max(0,state.enemyHp-hpLost);
 renderEnemy();
 await sleep(100);
 if(hpLost>0){
  showDamageFloat(hpLost, isCritical||(effect==='overkill'), false);
 }else if(effect==='ineffective'){
  showDamageFloat(0, false, false, true);
 }
 const statusMap={'除你武器':'expelliarmus','昏昏倒地':'stupefy','統統石化':'petrificus','呼神護衛':'patronus'};
 setEnemyStatus(statusMap[spellKey]||'default');
 await sleep(1200);
 if(state.enemyHp<=0||isKill){
  state.score+=10+bonusPts;
  setFeedback(t('feedback_victory',{name:getEnemyName(enemy),score:10+bonusPts,bonus:bonusMsg}),'success');
  state.enemyDefeated=true;setEnemyStatus('defeated');state.currentEnemy=null;state.currentSpellKey=null;setSpellDisplay(null);posBtns.forEach(b=>b.classList.remove('active'));state.battleLocked=false;updateUI();
  await sleep(1500);if(state.lives>0){setFeedback(t('feedback_next'),'info');startAdventure();}else{setFeedback(t('feedback_gameover'),'fail');}
  return;
 }
 if(effect==='weak'&&Math.random()<0.5){
  setFeedback(t('feedback_dodge'),'success');
  await sleep(1500);
  resetBattleTurn(enemy);
  return;
 }
 await handleCounterAttack();
}

function resetBattleTurn(enemy){
 state.battleLocked=false;state.currentSpellKey=null;setSpellDisplay(null);posBtns.forEach(b=>b.classList.remove('active'));
 setFeedback(t('feedback_retry',{name:getEnemyName(enemy)}),'info');updateUI();posBtns.forEach(b=>b.disabled=false);dom.btnRecord.disabled=true;setEnemyStatus('default');renderEnemy();
}

async function handleCounterAttack(){
 if(state.lives<=0)return;
 state.lives-=1;setEnemyStatus('attacking');setFeedback(t('feedback_hit',{lives:state.lives}),'fail');updateUI();
 showDamageFloat(1, false, false);
 await sleep(1500);
 if(state.lives<=0){
  setFeedback(t('feedback_gameover'),'fail');
  state.battleLocked=true;state.enemyDefeated=true;state.currentEnemy=null;state.currentSpellKey=null;setSpellDisplay(null);posBtns.forEach(b=>b.classList.remove('active'));updateUI();dom.btnStart.disabled=false;setEnemyStatus('defeated');renderEnemy();
  return;
 }
 resetBattleTurn(state.currentEnemy);
}

function init(){
 try{const saved=localStorage.getItem('hp_spell_config');if(saved){const cfg=JSON.parse(saved);if(cfg.lang)lang=cfg.lang;}}catch(e){}
 dom.langToggle.addEventListener('click',()=>{lang=(lang==='zh')?'en':'zh';try{localStorage.setItem('hp_spell_config',JSON.stringify({lang:lang}));}catch(e){}updateUI();if(state.currentSpellKey){const s=SPELLS[state.currentSpellKey];if(s)setSpellDisplay(state.currentSpellKey,s.pinyin.replace(/\\|/g,'|'),'「'+getSpellDesc(state.currentSpellKey)+'」');}if(!state.currentEnemy)setFeedback(t('feedback_wait'),'info');else setFeedback(t('feedback_encounter',{name:getEnemyName(state.currentEnemy)}),'info');});
 dom.btnStart.addEventListener('click',startAdventure);
 dom.posWand.addEventListener('click',()=>selectPosition('wand'));
 dom.posBody.addEventListener('click',()=>selectPosition('body'));
 dom.posForehead.addEventListener('click',()=>selectPosition('forehead'));
 dom.posDefense.addEventListener('click',()=>selectPosition('defense'));
 dom.btnRecord.addEventListener('click',handleRecord);
 updateUI();setFeedback(t('feedback_wait'),'info');
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
