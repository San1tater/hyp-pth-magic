<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>哈利波特 · 魔法對決</title>

    <style>
        /* 全域重置 & 字體 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Noto+Sans+TC:wght@400;700&display=swap');

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
            background: #0a0a12;
            overflow: hidden;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(60, 30, 80, 0.5) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 40, 80, 0.5) 0%, transparent 60%),
                linear-gradient(180deg, #0a0a12 0%, #1a0e1e 100%);
        }

        .container {
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            background: linear-gradient(160deg, #1a1025, #0f0a1a);
            border: 2px solid #b8963a;
            box-shadow: inset 0 0 80px rgba(184, 150, 58, 0.03);
            padding: 16px 20px 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
        }
        .container::before {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, #b8963a, #f5d98a, #b8963a);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.3;
        }

        /* 標題與語言切換 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .header h1 {
            font-family: 'MedievalSharp', cursive;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(180deg, #f5d98a, #c9a050);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(184, 150, 58, 0.2);
            letter-spacing: 4px;
        }
        .header h1 small {
            font-size: 0.7rem;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-text-fill-color: #a08060;
            opacity: 0.7;
            letter-spacing: 1px;
        }
        .lang-switch {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(184, 150, 58, 0.25);
            border-radius: 30px;
            padding: 4px 12px;
            color: #ddd0c0;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans TC', sans-serif;
            flex-shrink: 0;
        }
        .lang-switch:hover {
            background: rgba(184, 150, 58, 0.15);
            border-color: #b8963a;
        }

        /* 狀態列 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            padding: 6px 16px 6px 20px;
            margin-bottom: 12px;
            border: 1px solid rgba(184, 150, 58, 0.15);
            backdrop-filter: blur(4px);
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 4px;
        }
        .status-bar .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ddd0c0;
            font-size: 0.9rem;
        }
        .status-bar .stat .icon {
            font-size: 1.1rem;
        }
        .status-bar .stat .value {
            font-weight: 700;
            color: #f5d98a;
            font-size: 1.1rem;
            min-width: 20px;
        }
        .status-bar .btn-start {
            background: linear-gradient(135deg, #b8963a, #8a6f2a);
            border: none;
            color: #1a1025;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 6px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(184, 150, 58, 0.25);
            font-family: 'Noto Sans TC', sans-serif;
            flex-shrink: 0;
        }
        .status-bar .btn-start:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 25px rgba(184, 150, 58, 0.45);
        }
        .status-bar .btn-start:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 敵人區域 — 圖片化顯示 */
        .enemy-area {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(184, 150, 58, 0.1);
            text-align: center;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
            position: relative;
        }
        .enemy-area .enemy-image {
            font-size: 4.5rem;
            line-height: 1.2;
            filter: drop-shadow(0 0 30px rgba(184, 150, 58, 0.15));
            transition: all 0.3s;
        }
        .enemy-area .enemy-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f5d98a;
            margin: 2px 0;
        }
        .enemy-area .enemy-status {
            font-size: 0.85rem;
            color: #b0a090;
            opacity: 0.9;
            margin-top: 2px;
        }
        .enemy-area .empty-hint {
            color: #706050;
            font-size: 1rem;
            opacity: 0.5;
            letter-spacing: 2px;
        }

        /* 部位按鈕 (移除古代魔法，增加自衛) */
        .positions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .positions .pos-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(184, 150, 58, 0.2);
            border-radius: 20px;
            padding: 10px 4px;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            color: #ddd0c0;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.8rem;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            user-select: none;
        }
        .positions .pos-btn .pos-icon {
            font-size: 1.8rem;
        }
        .positions .pos-btn .pos-label {
            font-weight: 400;
            font-size: 0.75rem;
            color: #c0b0a0;
        }
        .positions .pos-btn:hover:not(:disabled) {
            background: rgba(184, 150, 58, 0.12);
            border-color: #b8963a;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .positions .pos-btn:active:not(:disabled) {
            transform: scale(0.96);
        }
        .positions .pos-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
        }
        .positions .pos-btn.active {
            background: rgba(184, 150, 58, 0.18);
            border-color: #f5d98a;
            box-shadow: 0 0 30px rgba(184, 150, 58, 0.08);
        }
        .positions .pos-btn.defense {
            border-color: rgba(80, 180, 200, 0.3);
            background: rgba(80, 180, 200, 0.06);
        }
        .positions .pos-btn.defense:hover:not(:disabled) {
            border-color: #60c8e0;
            background: rgba(80, 180, 200, 0.15);
        }
        .positions .pos-btn.defense.active {
            border-color: #80d8f0;
            background: rgba(80, 180, 200, 0.2);
        }

        /* 施法提示 */
        .spell-display {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 20px;
            padding: 10px 16px;
            margin-bottom: 10px;
            border: 1px solid rgba(184, 150, 58, 0.1);
            min-height: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .spell-display .spell-char {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f5d98a;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(184, 150, 58, 0.1);
        }
        .spell-display .spell-pinyin {
            font-size: 0.95rem;
            color: #c0b0a0;
            letter-spacing: 3px;
            margin-top: 2px;
            opacity: 0.7;
        }
        .spell-display .spell-hint {
            font-size: 0.7rem;
            color: #806850;
            margin-top: 2px;
            letter-spacing: 1px;
        }
        .spell-display .spell-empty {
            color: #605040;
            font-size: 0.85rem;
            opacity: 0.5;
            letter-spacing: 2px;
        }

        /* 錄音 + 反饋 */
        .action-row {
            display: flex;
            gap: 12px;
            align-items: stretch;
            margin-bottom: 12px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .action-row .btn-record {
            flex: 1;
            min-width: 120px;
            background: linear-gradient(135deg, #8a3a4a, #5a2a3a);
            border: 1px solid rgba(200, 100, 120, 0.3);
            border-radius: 60px;
            padding: 12px 16px;
            font-size: 1.0rem;
            font-weight: 700;
            color: #f5e0d0;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Noto Sans TC', sans-serif;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(138, 58, 74, 0.2);
        }
        .action-row .btn-record:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 6px 30px rgba(138, 58, 74, 0.35);
            border-color: rgba(220, 140, 160, 0.4);
        }
        .action-row .btn-record:active:not(:disabled) {
            transform: scale(0.96);
        }
        .action-row .btn-record:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
        }
        .action-row .btn-record.recording {
            background: linear-gradient(135deg, #c04040, #802020);
            animation: pulse-rec 1s infinite;
            border-color: #ff6060;
        }
        @keyframes pulse-rec {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(200, 60, 60, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(200, 60, 60, 0.6);
            }
        }
        .action-row .btn-record .mic-icon {
            font-size: 1.4rem;
        }

        .action-row .feedback {
            flex: 1.2;
            min-width: 100px;
            padding: 8px 12px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
            color: #ddd0c0;
            font-size: 0.85rem;
            text-align: center;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            word-break: break-word;
        }
        .action-row .feedback.success {
            color: #7ddfa0;
            border-color: rgba(100, 220, 150, 0.2);
            background: rgba(60, 180, 100, 0.08);
        }
        .action-row .feedback.fail {
            color: #ef8a8a;
            border-color: rgba(220, 100, 100, 0.2);
            background: rgba(180, 60, 60, 0.08);
        }
        .action-row .feedback.info {
            color: #b0c8e8;
            border-color: rgba(100, 150, 220, 0.15);
            background: rgba(60, 100, 180, 0.06);
        }
        .action-row .feedback.warn {
            color: #f0d080;
            border-color: rgba(220, 200, 80, 0.15);
            background: rgba(180, 160, 60, 0.06);
        }

        /* 配置區域 */
        .config-section {
            margin-top: auto;
            border-top: 1px solid rgba(184, 150, 58, 0.08);
            padding-top: 10px;
            flex-shrink: 0;
        }
        .config-toggle {
            background: none;
            border: none;
            color: #706050;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            transition: all 0.2s;
            font-family: 'Noto Sans TC', sans-serif;
            letter-spacing: 1px;
            opacity: 0.5;
            width: 100%;
            text-align: center;
        }
        .config-toggle:hover {
            opacity: 1;
            color: #b8963a;
        }
        .config-body {
            display: none;
            margin-top: 8px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-direction: column;
            gap: 6px;
        }
        .config-body.open {
            display: flex;
        }
        .config-body .config-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .config-body .config-row label {
            color: #a09080;
            font-size: 0.7rem;
            min-width: 50px;
            letter-spacing: 1px;
        }
        .config-body .config-row input {
            flex: 1;
            min-width: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 4px 10px;
            color: #ddd0c0;
            font-size: 0.75rem;
            font-family: 'Noto Sans TC', sans-serif;
            outline: none;
            transition: border 0.2s;
        }
        .config-body .config-row input:focus {
            border-color: #b8963a;
        }
        .config-body .config-row input::placeholder {
            color: #504030;
        }
        .config-body .config-row .btn-mode {
            background: rgba(184, 150, 58, 0.1);
            border: 1px solid rgba(184, 150, 58, 0.2);
            border-radius: 30px;
            padding: 4px 14px;
            color: #b8963a;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans TC', sans-serif;
            white-space: nowrap;
        }
        .config-body .config-row .btn-mode:hover {
            background: rgba(184, 150, 58, 0.2);
        }
        .config-body .config-row .btn-mode.active-mode {
            background: rgba(184, 150, 58, 0.25);
            border-color: #f5d98a;
            color: #f5d98a;
        }
        .config-body .config-status {
            color: #706050;
            font-size: 0.7rem;
            text-align: center;
            padding-top: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            margin-top: 4px;
        }
        .config-body .config-status .ok {
            color: #7ddfa0;
        }
        .config-body .config-status .err {
            color: #ef8a8a;
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px 12px 16px;
            }
            .header h1 {
                font-size: 1.6rem;
                letter-spacing: 2px;
            }
            .positions {
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
            }
            .positions .pos-btn {
                padding: 8px 2px;
                font-size: 0.7rem;
            }
            .positions .pos-btn .pos-icon {
                font-size: 1.4rem;
            }
            .status-bar {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .action-row {
                flex-direction: column;
            }
            .action-row .btn-record {
                width: 100%;
                min-width: unset;
            }
            .action-row .feedback {
                width: 100%;
                min-height: 36px;
            }
            .enemy-area .enemy-image {
                font-size: 3.2rem;
            }
            .enemy-area .enemy-name {
                font-size: 1.2rem;
            }
            .spell-display .spell-char {
                font-size: 1.4rem;
            }
            .config-body .config-row {
                flex-direction: column;
                align-items: stretch;
            }
            .config-body .config-row label {
                min-width: unset;
            }
        }
        .flex-1 {
            flex: 1;
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- 標題與語言切換 -->
        <div class="header">
            <h1>⚡ 哈利波特 <small>魔法對決</small></h1>
            <button class="lang-switch" id="langToggle">EN / 中</button>
        </div>

        <!-- 狀態列 -->
        <div class="status-bar">
            <div class="stat">
                <span class="icon">🏆</span>
                <span id="scoreLabel">分數</span>
                <span class="value" id="scoreDisplay">0</span>
            </div>
            <div class="stat">
                <span class="icon">❤️</span>
                <span id="livesLabel">生命</span>
                <span class="value" id="livesDisplay">3</span>
            </div>
            <button class="btn-start" id="btnStart">開始冒險</button>
        </div>

        <!-- 敵人區域 (圖片化) -->
        <div class="enemy-area" id="enemyArea">
            <div class="empty-hint">🪄 點擊「開始冒險」迎接挑戰</div>
        </div>

        <!-- 部位按鈕 (魔杖、身體、額頭、自衛) -->
        <div class="positions" id="positionsContainer">
            <button class="pos-btn" data-pos="wand" id="posWand" disabled>
                <span class="pos-icon">🪄</span>
                <span class="pos-label" id="labelWand">魔杖</span>
            </button>
            <button class="pos-btn" data-pos="body" id="posBody" disabled>
                <span class="pos-icon">🧍</span>
                <span class="pos-label" id="labelBody">身體</span>
            </button>
            <button class="pos-btn" data-pos="forehead" id="posForehead" disabled>
                <span class="pos-icon">👁</span>
                <span class="pos-label" id="labelForehead">額頭</span>
            </button>
            <button class="pos-btn defense" data-pos="defense" id="posDefense" disabled>
                <span class="pos-icon">🛡️</span>
                <span class="pos-label" id="labelDefense">自衛</span>
            </button>
        </div>

        <!-- 施法提示 -->
        <div class="spell-display" id="spellDisplay">
            <div class="spell-empty" id="spellEmpty">🔮 選擇一個部位以顯示咒語</div>
        </div>

        <!-- 錄音 + 反饋 -->
        <div class="action-row">
            <button class="btn-record" id="btnRecord" disabled>
                <span class="mic-icon">🎤</span>
                <span id="recordLabel">開始唸咒</span>
            </button>
            <div class="feedback" id="feedbackDisplay">💬 等待你的行動…</div>
        </div>

        <!-- 配置區域 -->
        <div class="config-section">
            <button class="config-toggle" id="configToggle">⚙️ 語音評測設定</button>
            <div class="config-body" id="configBody">
                <div class="config-row">
                    <label>APPID</label>
                    <input type="text" id="xfAppid" placeholder="科大訊飛 APPID" />
                </div>
                <div class="config-row">
                    <label>APIKey</label>
                    <input type="text" id="xfApiKey" placeholder="科大訊飛 APIKey" />
                </div>
                <div class="config-row" style="justify-content:center; gap:10px;">
                    <button class="btn-mode active-mode" data-mode="webspeech" id="modeWebSpeech">🌐 瀏覽器語音</button>
                    <button class="btn-mode" data-mode="xunfei" id="modeXunfei">🧠 科大訊飛 (模擬)</button>
                </div>
                <div class="config-status" id="configStatus">🔊 目前使用：瀏覽器語音評測 (模擬評分)</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // =============================================================
            //  多語言文字
            // =============================================================
            const LANG = {
                'zh': {
                    title: '⚡ 哈利波特 魔法對決',
                    score: '分數',
                    lives: '生命',
                    start: '開始冒險',
                    enemy_default: '🪄 點擊「開始冒險」迎接挑戰',
                    wand: '魔杖',
                    body: '身體',
                    forehead: '額頭',
                    defense: '自衛',
                    spell_empty: '🔮 選擇一個部位以顯示咒語',
                    record: '開始唸咒',
                    recording: '唸咒中…',
                    feedback_wait: '💬 等待你的行動…',
                    feedback_encounter: '⚔️ 遭遇了 {name}！選擇咒語！',
                    feedback_spell_ready: '🔮 準備唸出「{spell}」',
                    feedback_listening: '🎤 請唸出咒語…',
                    feedback_score: '📊 評分：{score} 分 ({text})',
                    feedback_fail: '❌ 語音錯誤: {err}',
                    feedback_weak: '⚠️ 「{spell}」效果微弱！',
                    feedback_dodge: '🌀 成功閃避反擊！再試一次！',
                    feedback_dodge_fail: '💥 閃避失敗，遭受反擊！',
                    feedback_ineffective: '💔 「{spell}」對 {enemy} 無效！',
                    feedback_overkill: '🔥 「{spell}」過度強大！不被鼓勵！',
                    feedback_overkill_penalty: '⚖️ 濫用強大咒語，扣除 5 分。',
                    feedback_hit: '💀 反擊命中！剩餘生命：{lives}',
                    feedback_gameover: '💀 你倒下了… 點擊「開始冒險」重來',
                    feedback_retry: '🔄 繼續挑戰 {name}，選擇咒語！',
                    feedback_restart: '🔄 遊戲重啟！',
                    feedback_victory: '🎉 成功擊敗 {name}！ +{score} 分{bonus}',
                    bonus_perfect: ' 🌟 完美咒語！額外 +5 分！',
                    bonus_great: ' ✨ 出色的咒語！額外 +2 分！',
                    feedback_next: '⚔️ 準備迎接下一場戰鬥！',
                    enemy_status_default: '現身',

            // =============================================================

            function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

            // =============================================================
            //  敵人圖片化顯示 (七種狀態)
            // =============================================================
            function renderEnemy() {
                const area = dom.enemyArea;
                if (!state.currentEnemy) {
                    area.innerHTML = `<div class="empty-hint">${t('enemy_default')}</div>`;
                    return;
                }
                const e = state.currentEnemy;

            function setEnemyStatus(status) {

            // =============================================================
            //  咒語效果 & 評分
            // =============================================================

            function getSpellEffect(spellKey, enemyId) {
                const spell = SPELLS[spellKey];
                if (!spell) return 'ineffective';
                return spell.effects[enemyId] || 'ineffective';
            }

            function evaluateSpeech(recognizedText, targetSpell) {
                if (!recognizedText) return 0;
                const clean = s => s.replace(/\s+/g, '');
                const rec = clean(recognizedText);
                const target = clean(targetSpell);
                if (rec === target) return 100;
                const common = [...rec].filter(ch => target.includes(ch));
                let score = Math.min(100, Math.round((common.length / target.length) * 100));
                const noise = rand(-8, 8);
                return Math.max(0, Math.min(100, score + noise));
            }

            // =============================================================
            //  遊戲核心
            // =============================================================

            function startAdventure() {
                if (state.battleLocked || state.isRecording) return;
                if (state.lives <= 0) {
                    state.lives = 3;
                    state.score = 0;
                    state.battleLocked = false;
                    state.enemyDefeated = false;
                    state.currentEnemy = null;
                    state.currentSpellKey = null;
                    setSpellDisplay(null);
                    posBtns.forEach(b => b.classList.remove('active'));
                    setFeedback(t('feedback_restart'), 'info');
                    updateUI();
                }
                const enemy = pick(ENEMIES);
                state.currentEnemy = enemy;
                state.currentSpellKey = null;
                state.enemyDefeated = false;
                state.battleLocked = false;
                state.enemyStatus = 'default';
                setSpellDisplay(null);
                setFeedback(t('feedback_encounter', { name: getEnemyName(enemy) }), 'info');
                posBtns.forEach(b => b.classList.remove('active'));
                updateUI();
                posBtns.forEach(b => b.disabled = false);
                dom.btnRecord.disabled = true;
                setEnemyStatus('default');
            }

            function selectPosition(posKey) {
                if (!state.currentEnemy || state.battleLocked || state.isRecording || state.enemyDefeated) return;
                const spellKey = POS_TO_SPELL[posKey];
                if (!spellKey) return;
                const spell = SPELLS[spellKey];
                if (!spell) return;

                state.currentSpellKey = spellKey;
                posBtns.forEach(b => b.classList.remove('active'));
                const btn = posMap[posKey];
                if (btn) btn.classList.add('active');

                const spellName = currentLang === 'zh' ? spellKey : spellKey; // 保留中文顯示
                setSpellDisplay(spellKey, spell.pinyin, `「${getSpellDesc(spellKey)}」`);
                setFeedback(t('feedback_spell_ready', { spell: spellKey }), 'info');
                dom.btnRecord.disabled = false;

            // =============================================================
            //  語音識別
            // =============================================================

            function initWebSpeech() {
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    setFeedback('❌ 瀏覽器不支援語音識別', 'fail');
                    return false;
                }
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                const rec = new SR();
                rec.lang = 'zh-CN';
                rec.continuous = false;
                rec.interimResults = true;
                rec.maxAlternatives = 1;
                state.recognition = rec;
                return true;
            }

            function startWebSpeech() {
                return new Promise((resolve, reject) => {
                    if (!state.recognition) {
                        if (!initWebSpeech()) {
                            reject(new Error('不支援語音識別'));
                            return;
                        }
                    }
                    const rec = state.recognition;
                    let finalText = '';
                    let interimText = '';

                    rec.onresult = (event) => {
                        let interim = '';
                        let final = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const transcript = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                final += transcript;
                            } else {
                                interim += transcript;
                            }
                        }
                        interimText = interim;
                        finalText = final || interim;
                        setFeedback(`🗣️ 識別中：${finalText || interimText || '…'}`, 'info');
                    };

                    rec.onerror = (event) => {
                        reject(new Error('語音識別錯誤: ' + event.error));
                    };

                    rec.onend = () => {
                        const result = finalText || interimText;
                        if (result.trim()) {
                            resolve(result.trim());
                        } else {
                            reject(new Error('未偵測到語音'));
                        }
                    };

                    try {
                        rec.start();
                    } catch (e) {
                        reject(new Error('無法啟動語音識別: ' + e.message));
                    }
                });
            }

            async function startXunfeiEvaluation() {
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    throw new Error('瀏覽器不支援語音識別');
                }
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                const rec = new SR();
                rec.lang = 'zh-CN';
                rec.continuous = false;
                rec.interimResults = false;
                let finalText = '';
                return new Promise((resolve, reject) => {
                    rec.onresult = (event) => {
                        const result = event.results[0][0].transcript;
                        finalText = result.trim();
                        setFeedback(`🧠 訊飛識別：${finalText}`, 'info');
                    };
                    rec.onerror = (event) => {
                        reject(new Error('語音識別錯誤: ' + event.error));
                    };
                    rec.onend = () => {
                        if (finalText) {
                            resolve(finalText);
                        } else {
                            reject(new Error('未偵測到語音'));
                        }
                    };
                    try {
                        rec.start();
                    } catch (e) {
                        reject(new Error('無法啟動語音識別: ' + e.message));
                    }
                });
            }

            // =============================================================
            //  戰鬥流程
            // =============================================================

            async function handleRecord() {
                if (!state.currentEnemy || !state.currentSpellKey || state.isRecording || state.battleLocked || state
                    .enemyDefeated) return;

                const spellKey = state.currentSpellKey;
                const enemy = state.currentEnemy;

                state.isRecording = true;
                dom.btnRecord.disabled = true;
                dom.btnRecord.classList.add('recording');
                dom.recordLabel.textContent = t('recording');
                setFeedback(t('feedback_listening'), 'info');

                try {
                    let recognizedText = '';
                    if (state.mode === 'xunfei') {
                        try {
                            recognizedText = await startXunfeiEvaluation();
                        } catch (xfErr) {
                            setFeedback(t('feedback_fail', { err: xfErr.message }), 'warn');
                            if (initWebSpeech()) {
                                recognizedText = await startWebSpeech();
                            } else {
                                throw new Error('所有語音方式皆失敗');
                            }
                        }
                    } else {
                        if (!state.recognition) initWebSpeech();
                        recognizedText = await startWebSpeech();
                    }

                    const score = evaluateSpeech(recognizedText, spellKey);
                    setFeedback(t('feedback_score', { score: score, text: recognizedText || '無聲' }), 'info');

                    const effect = getSpellEffect(spellKey, enemy.id);
                    await handleBattleResult(effect, spellKey, enemy, score);

                } catch (err) {
                    setFeedback(t('feedback_fail', { err: err.message }), 'fail');
                    await handleCounterAttack(false);
                } finally {
                    state.isRecording = false;
                    dom.btnRecord.classList.remove('recording');
                    dom.recordLabel.textContent = t('record');
                    updateUI();
                    if (state.battleLocked || state.enemyDefeated || state.lives <= 0) {
                        posBtns.forEach(b => b.disabled = true);
                        dom.btnRecord.disabled = true;
                    } else {
                        posBtns.forEach(b => b.disabled = false);
                        dom.btnRecord.disabled = !state.currentSpellKey;
                    }
                }
            }

            async function handleBattleResult(effect, spellKey, enemy, score) {
                const isEffective = effect === 'effective';
                const isWeak = effect === 'weak';
                const isIneffective = effect === 'ineffective';
                const isOverkill = effect === 'overkill';

                if (isEffective) {
                    if (score >= 60) {
                        let bonus = 0;
                        let bonusMsg = '';
                        if (score >= 90) {
                            bonus = 5;
                            bonusMsg = t('bonus_perfect');
                        } else if (score >= 75) {
                            bonus = 2;
                            bonusMsg = t('bonus_great');
                        }
                        state.score += 10 + bonus;
                        setFeedback(t('feedback_victory', { name: getEnemyName(enemy), score: 10 + bonus, bonus: bonusMsg }),
                            'success');
                        state.enemyDefeated = true;
                        state.battleLocked = true;
                        setEnemyStatus('defeated');
                        state.currentEnemy = null;
                        state.currentSpellKey = null;
                        setSpellDisplay(null);
                        posBtns.forEach(b => b.classList.remove('active'));
                        updateUI();
                        await sleep(1200);
                        if (state.lives > 0) {
                            setFeedback(t('feedback_next'), 'info');
                            startAdventure();
                        } else {
                            setFeedback(t('feedback_gameover'), 'fail');
                        }
                    } else {
                        setFeedback(`⚠️ 評分 ${score}，未達 60% 擊殺門檻！`, 'warn');
                        await handleCounterAttack(false);
                    }
                } else if (isWeak) {
                    setFeedback(t('feedback_weak', { spell: spellKey }), 'warn');
                    const dodge = Math.random() < 0.5;
                    if (dodge) {
                        setFeedback(t('feedback_dodge'), 'success');
                        state.battleLocked = false;
                        state.currentSpellKey = null;
                        setSpellDisplay(null);
                        posBtns.forEach(b => b.classList.remove('active'));
                        setFeedback(t('feedback_retry', { name: getEnemyName(enemy) }), 'info');
                        updateUI();
                        posBtns.forEach(b => b.disabled = false);
                        dom.btnRecord.disabled = true;
                        setEnemyStatus('default');
                    } else {
                        setFeedback(t('feedback_dodge_fail'), 'fail');
                        await handleCounterAttack(false);
                    }
                } else if (isIneffective || isOverkill) {
                    if (isOverkill) {
                        setFeedback(t('feedback_overkill', { spell: spellKey }), 'warn');
                        state.score = Math.max(0, state.score - 5);
                        setFeedback(t('feedback_overkill_penalty'), 'warn');
                    } else {
                        setFeedback(t('feedback_ineffective', { spell: spellKey, enemy: getEnemyName(enemy) }), 'fail');
                    }
                    await handleCounterAttack(false);
                }
            }

            async function handleCounterAttack(forceFail = false) {
                if (state.lives <= 0) return;
                state.lives -= 1;
                setEnemyStatus('attacking');
                setFeedback(t('feedback_hit', { lives: state.lives }), 'fail');
                updateUI();

                if (state.lives <= 0) {
                    setFeedback(t('feedback_gameover'), 'fail');
                    state.battleLocked = true;
                    state.enemyDefeated = true;
                    state.currentEnemy = null;
                    state.currentSpellKey = null;
                    setSpellDisplay(null);
                    posBtns.forEach(b => b.classList.remove('active'));
                    updateUI();
                    dom.btnStart.disabled = false;
                    setEnemyStatus('defeated');
                    return;
                }

                // 保留敵人，重置
                state.battleLocked = false;
                state.currentSpellKey = null;
                setSpellDisplay(null);
                posBtns.forEach(b => b.classList.remove('active'));
                setFeedback(t('feedback_retry', { name: getEnemyName(state.currentEnemy) }), 'info');
                updateUI();
                posBtns.forEach(b => b.disabled = false);
                dom.btnRecord.disabled = true;
                setEnemyStatus('default');
            }

            // =============================================================
            //  初始化與事件
            // =============================================================

            function init() {
                try {
                    const saved = localStorage.getItem('hp_spell_config');
                    if (saved) {
                        const cfg = JSON.parse(saved);
                        if (cfg.appid) dom.xfAppid.value = cfg.appid;
                        if (cfg.apikey) dom.xfApiKey.value = cfg.apikey;
                        if (cfg.mode) {
                            state.mode = cfg.mode;
                            updateModeUI();
                        }
                        if (cfg.lang) {
                            currentLang = cfg.lang;
                        }
                        state.xfAppid = cfg.appid || '';
                        state.xfApiKey = cfg.apikey || '';
                    }
                } catch (e) { /* ignore */ }

                initWebSpeech();

                // 語言切換
                dom.langToggle.addEventListener('click', () => {
                    currentLang = (currentLang === 'zh') ? 'en' : 'zh';
                    saveConfig();
                    updateUI();
                    // 重新顯示咒語
                    if (state.currentSpellKey) {
                        const spell = SPELLS[state.currentSpellKey];
                        if (spell) {
                            setSpellDisplay(state.currentSpellKey, spell.pinyin, `「${getSpellDesc(state.currentSpellKey)}」`);
                        }
                    }
                    // 更新反饋（如果沒有戰鬥，保持等待）
                    if (!state.currentEnemy) {
                        setFeedback(t('feedback_wait'), 'info');
                    } else {
                        setFeedback(t('feedback_encounter', { name: getEnemyName(state.currentEnemy) }), 'info');
                    }
                });

                dom.btnStart.addEventListener('click', startAdventure);

                dom.posWand.addEventListener('click', () => selectPosition('wand'));
                dom.posBody.addEventListener('click', () => selectPosition('body'));
                dom.posForehead.addEventListener('click', () => selectPosition('forehead'));
                dom.posDefense.addEventListener('click', () => selectPosition('defense'));

                dom.btnRecord.addEventListener('click', handleRecord);

                dom.configToggle.addEventListener('click', () => {
                    dom.configBody.classList.toggle('open');
                });

                dom.modeWebSpeech.addEventListener('click', () => {
                    state.mode = 'webspeech';
                    updateModeUI();
                    saveConfig();
                    setFeedback('🌐 切換至瀏覽器語音評測', 'info');
                });
                dom.modeXunfei.addEventListener('click', () => {
                    state.mode = 'xunfei';
                    updateModeUI();
                    saveConfig();
                    setFeedback('🧠 切換至科大訊飛 (模擬) 評測', 'info');
                });

                dom.xfAppid.addEventListener('change', () => {
                    state.xfAppid = dom.xfAppid.value.trim();
                    saveConfig();
                });
                dom.xfApiKey.addEventListener('change', () => {
                    state.xfApiKey = dom.xfApiKey.value.trim();
                    saveConfig();
                });

                updateUI();
                setFeedback(t('feedback_wait'), 'info');
                updateModeUI();
            }

            function updateModeUI() {
                dom.modeWebSpeech.classList.toggle('active-mode', state.mode === 'webspeech');
                dom.modeXunfei.classList.toggle('active-mode', state.mode === 'xunfei');
                const modeName = state.mode === 'webspeech' ? '瀏覽器語音評測 (模擬評分)' : '科大訊飛 (模擬)';
                dom.configStatus.innerHTML = `🔊 目前使用：<span class="ok">${modeName}</span>`;
                if (state.mode === 'xunfei') {
                    if (!state.xfAppid || !state.xfApiKey) {
                        dom.configStatus.innerHTML += ' <span class="err">⚠️ 請填寫 APPID 與 APIKey</span>';
                    } else {
                        dom.configStatus.innerHTML += ' <span class="ok">✅ 已配置</span>';
                    }
                }
            }

            function saveConfig() {
                try {
                    const cfg = {
                        appid: dom.xfAppid.value.trim(),
                        apikey: dom.xfApiKey.value.trim(),
                        mode: state.mode,
                        lang: currentLang
                    };
                    localStorage.setItem('hp_spell_config', JSON.stringify(cfg));
                    state.xfAppid = cfg.appid;
                    state.xfApiKey = cfg.apikey;
                } catch (e) { /* ignore */ }
                updateModeUI();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            window.__HP = { state, startAdventure, handleRecord, selectPosition };

        })();
    </script>

</body>
</html>
