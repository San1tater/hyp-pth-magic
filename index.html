<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>⚡ 哈利波特 · 魔法對決</title>

    <style>
        /* ===== 全局重置 & 字體 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+TC:wght@400;600;700&display=swap');

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans TC', 'Cinzel', serif;
            background: #0b0e14;
            background-image: radial-gradient(ellipse at 20% 50%, #1a1f2e 0%, #0b0e14 70%);
            color: #f0e6d3;
        }

        /* ===== 主容器 — 全屏填滿 ===== */
        .game-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: rgba(11, 14, 20, 0.92);
            backdrop-filter: blur(8px);
            padding: 18px 28px 22px;
            overflow: hidden;
            border: none;
            box-shadow: none;
            border-radius: 0;
        }

        /* ===== 頂欄 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.15);
            margin-bottom: 12px;
        }

        .title {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(253, 160, 133, 0.15);
        }
        .title span {
            font-weight: 400;
            font-size: 1.0rem;
            opacity: 0.7;
            -webkit-text-fill-color: #b8a88a;
            background: none;
        }

        .lang-toggle {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 4px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            flex-shrink: 0;
        }
        .lang-toggle button {
            background: transparent;
            border: none;
            color: #8a7e6a;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Noto Sans TC', sans-serif;
            letter-spacing: 0.5px;
        }
        .lang-toggle button.active {
            background: rgba(212, 175, 55, 0.2);
            color: #f0d68a;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.05);
        }
        .lang-toggle button:hover:not(.active) {
            color: #c8bca0;
        }

        /* ===== 狀態欄 ===== */
        .status-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px 20px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 40px;
            padding: 8px 24px 8px 28px;
            margin-bottom: 14px;
            border: 1px solid rgba(212, 175, 55, 0.06);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #d4cdbc;
        }
        .status-item .icon {
            font-size: 1.4rem;
        }
        .status-item .value {
            color: #f0e6d3;
            font-size: 1.4rem;
            font-weight: 700;
            min-width: 28px;
            text-align: center;
        }
        .status-item .value.score-val {
            color: #f6d365;
        }
        .status-item .value.lives-val {
            color: #ff7e6b;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4a84a, #b8923a);
            border: none;
            color: #0b0e14;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 10px 34px;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(255, 215, 100, 0.15);
            flex-shrink: 0;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.35);
            background: linear-gradient(135deg, #e0bc5a, #c8a244);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-primary.danger {
            background: linear-gradient(135deg, #b84a3a, #8a3228);
            box-shadow: 0 4px 20px rgba(184, 74, 58, 0.25);
        }
        .btn-primary.danger:hover:not(:disabled) {
            background: linear-gradient(135deg, #d05a48, #a03a2e);
            box-shadow: 0 8px 30px rgba(184, 74, 58, 0.35);
        }

        /* ===== 敵人區域 — 佔據主要空間，不被壓縮 ===== */
        .enemy-area {
            flex: 1 1 auto;
            min-height: 0;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 28px;
            padding: 18px 24px 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(212, 175, 55, 0.05);
            position: relative;
            display: flex;
            align-items: center;
            gap: 24px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* 傷害數字容器 — 位於敵人區域右上角，垂直排列 */
        .damage-log-container {
            position: absolute;
            top: 16px;
            right: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            pointer-events: none;
            z-index: 10;
            max-height: 80%;
            overflow-y: auto;
            padding-right: 4px;
        }
        .damage-log-container .damage-item {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 2.0rem;
            color: #ff6b5a;
            text-shadow: 0 0 30px rgba(255, 80, 50, 0.4);
            opacity: 0.9;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .damage-log-container .damage-item.critical {
            color: #ffd93d;
            font-size: 2.6rem;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }
        .damage-log-container .damage-item.ineffective {
            color: #6a7a8a;
            font-size: 1.6rem;
            text-shadow: 0 0 20px rgba(100, 120, 140, 0.2);
        }
        .damage-log-container .damage-item.heal {
            color: #6bcb8a;
            text-shadow: 0 0 30px rgba(80, 200, 120, 0.3);
        }

        .enemy-avatar {
            flex-shrink: 0;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(30, 34, 50, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5.5rem;
            border: 2px solid rgba(212, 175, 55, 0.15);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
        }
        .enemy-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .enemy-avatar .emoji-fallback {
            font-size: 5.5rem;
            line-height: 1;
        }

        .enemy-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .enemy-name {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #f0e6d3;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .enemy-name .sub {
            font-size: 1.0rem;
            font-weight: 400;
            color: #8a7e6a;
            font-family: 'Noto Sans TC', sans-serif;
        }
        .enemy-status-text {
            font-size: 1.1rem;
            color: #b8a88a;
            margin-top: 4px;
            min-height: 1.6em;
        }
        .enemy-hp-bar {
            margin-top: 14px;
            width: 100%;
            height: 14px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .enemy-hp-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #f6d365, #fda085);
            border-radius: 20px;
            transition: width 0.5s ease;
            box-shadow: 0 0 20px rgba(253, 160, 133, 0.1);
        }
        .enemy-hp-fill.low {
            background: linear-gradient(90deg, #ff6b5a, #ff4a3a);
        }

        /* ===== 咒語選擇 — 固定高度，不壓縮上方 ===== */
        .spell-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            flex-shrink: 0;
            margin-bottom: 12px;
            /* 限制高度，避免過度伸展 */
            max-height: 110px;
        }
        .spell-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(212, 175, 55, 0.08);
            border-radius: 20px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Noto Sans TC', sans-serif;
            color: #b8a88a;
            font-weight: 600;
            font-size: 0.95rem;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .spell-btn .emoji {
            display: block;
            font-size: 2.0rem;
            margin-bottom: 2px;
        }
        .spell-btn .label {
            display: block;
            font-size: 0.85rem;
        }
        .spell-btn:hover:not(.active) {
            background: rgba(212, 175, 55, 0.06);
            border-color: rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
        }
        .spell-btn.active {
            background: rgba(212, 175, 55, 0.12);
            border-color: #d4a84a;
            color: #f0e6d3;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.05);
        }
        .spell-btn .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #d4a84a;
            color: #0b0e14;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .spell-btn.active .badge {
            opacity: 1;
        }

        /* ===== 咒語顯示區 ===== */
        .spell-display {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 12px 24px;
            margin-bottom: 12px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.04);
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .spell-display .spell-chars {
            font-size: 2.4rem;
            font-weight: 700;
            color: #f0e6d3;
            letter-spacing: 8px;
            font-family: 'Cinzel', serif;
        }
        .spell-display .spell-pinyin {
            font-size: 1.1rem;
            color: #8a7e6a;
            margin-top: 2px;
            letter-spacing: 3px;
            font-weight: 400;
        }
        .spell-display .spell-hint {
            font-size: 0.95rem;
            color: #6a7a8a;
            margin-top: 4px;
            font-style: italic;
        }
        .spell-display .empty-hint {
            color: #4a4e5a;
            font-size: 1.1rem;
        }

        /* ===== 操作區 ===== */
        .action-area {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding-top: 4px;
        }
        .action-area .btn-record {
            background: linear-gradient(135deg, #3a4a6a, #2a3a5a);
            border: none;
            color: #f0e6d3;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 14px 44px;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Noto Sans TC', sans-serif;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .action-area .btn-record:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #4a5a7a, #3a4a6a);
        }
        .action-area .btn-record:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }
        .action-area .btn-record.recording {
            background: linear-gradient(135deg, #b84a3a, #8a3228);
            animation: pulse-red 1.2s infinite;
        }
        @keyframes pulse-red {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(184, 74, 58, 0.3);
            }
            50% {
                box-shadow: 0 0 0 16px rgba(184, 74, 58, 0);
            }
        }

        .action-area .feedback {
            flex: 1;
            min-width: 200px;
            text-align: center;
            font-size: 1.05rem;
            color: #b8a88a;
            padding: 10px 18px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.2);
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(212, 175, 55, 0.04);
        }
        .action-area .feedback.success {
            color: #6bcb8a;
            border-color: rgba(80, 200, 120, 0.15);
        }
        .action-area .feedback.error {
            color: #ff6b5a;
            border-color: rgba(255, 80, 50, 0.15);
        }
        .action-area .feedback.info {
            color: #6aa8d4;
            border-color: rgba(80, 160, 220, 0.15);
        }

        /* ===== 遊戲結束遮罩 ===== */
        .game-over-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            border-radius: 28px;
            z-index: 30;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
            color: #f0e6d3;
            font-family: 'Cinzel', serif;
        }
        .game-over-overlay.show {
            display: flex;
        }
        .game-over-overlay .big-text {
            font-size: 3.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b5a, #ff4a3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .game-over-overlay .sub-text {
            font-size: 1.4rem;
            color: #b8a88a;
            -webkit-text-fill-color: #b8a88a;
        }

        /* ===== iPad 橫屏專屬微調 ===== */
        @media (orientation: landscape) and (min-width: 768px) {
            .game-container {
                padding: 20px 36px 28px;
            }
            .enemy-area {
                padding: 22px 32px 20px;
                gap: 32px;
            }
            .enemy-avatar {
                width: 160px;
                height: 160px;
                font-size: 6rem;
            }
            .enemy-name {
                font-size: 2.6rem;
            }
            .spell-display .spell-chars {
                font-size: 3.0rem;
            }
            .spell-btn {
                padding: 16px 12px;
                font-size: 1.0rem;
            }
            .spell-btn .emoji {
                font-size: 2.4rem;
            }
            .action-area .btn-record {
                font-size: 1.3rem;
                padding: 16px 52px;
            }
            .damage-log-container .damage-item {
                font-size: 2.4rem;
            }
            .damage-log-container .damage-item.critical {
                font-size: 3.0rem;
            }
        }

        /* ===== 響應式（手機豎屏） ===== */
        @media (max-width: 767px) {
            .game-container {
                padding: 12px 14px 16px;
            }
            .title {
                font-size: 1.2rem;
            }
            .title span {
                font-size: 0.7rem;
            }
            .lang-toggle button {
                font-size: 0.7rem;
                padding: 4px 12px;
            }
            .status-bar {
                padding: 6px 14px;
                gap: 6px;
                border-radius: 30px;
                flex-wrap: wrap;
            }
            .status-item {
                font-size: 0.85rem;
            }
            .status-item .value {
                font-size: 1.0rem;
                min-width: 20px;
            }
            .btn-primary {
                font-size: 0.85rem;
                padding: 6px 16px;
            }
            .enemy-area {
                flex-direction: column;
                text-align: center;
                padding: 14px;
                gap: 12px;
                min-height: 160px;
            }
            .enemy-avatar {
                width: 90px;
                height: 90px;
                font-size: 3.2rem;
            }
            .enemy-avatar .emoji-fallback {
                font-size: 3.2rem;
            }
            .enemy-name {
                font-size: 1.2rem;
                justify-content: center;
            }
            .enemy-name .sub {
                font-size: 0.8rem;
            }
            .spell-selector {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
                max-height: 90px;
            }
            .spell-btn {
                padding: 8px 4px;
                font-size: 0.7rem;
                border-radius: 14px;
            }
            .spell-btn .emoji {
                font-size: 1.4rem;
            }
            .spell-display .spell-chars {
                font-size: 1.6rem;
                letter-spacing: 4px;
            }
            .spell-display .spell-pinyin {
                font-size: 0.9rem;
            }
            .action-area .btn-record {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
            .action-area .feedback {
                font-size: 0.85rem;
                min-height: 40px;
                min-width: 100px;
            }
            .damage-log-container {
                top: 8px;
                right: 12px;
            }
            .damage-log-container .damage-item {
                font-size: 1.4rem;
            }
            .damage-log-container .damage-item.critical {
                font-size: 1.8rem;
            }
            .game-over-overlay .big-text {
                font-size: 2.2rem;
            }
            .game-over-overlay .sub-text {
                font-size: 1.0rem;
            }
        }

        @media (max-width: 420px) {
            .spell-selector {
                grid-template-columns: repeat(2, 1fr);
                max-height: 160px;
            }
            .header {
                flex-wrap: wrap;
                gap: 6px;
            }
        }

        /* ===== 滾動條 ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.2);
            border-radius: 10px;
        }

        /* ===== 實用 ===== */
        .relative {
            position: relative;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="game-container" id="app">

        <!-- ====== 頂欄 ====== -->
        <header class="header">
            <div class="title">⚡ 哈利波特 <span>· 魔法對決</span></div>
            <div class="lang-toggle" id="langToggle">
                <button data-lang="zh" class="active">繁體</button>
                <button data-lang="en">English</button>
            </div>
        </header>

        <!-- ====== 狀態欄 ====== -->
        <div class="status-bar">
            <div class="status-item">
                <span class="icon">🏆</span>
                <span data-i18n="score">分數</span>
                <span class="value score-val" id="scoreDisplay">0</span>
            </div>
            <div class="status-item">
                <span class="icon">❤️</span>
                <span data-i18n="lives">生命</span>
                <span class="value lives-val" id="livesDisplay">3</span>
            </div>
            <button class="btn-primary" id="btnAdventure" data-i18n="startAdventure">⚡ 開始冒險</button>
        </div>

        <!-- ====== 敵人區域 ====== -->
        <div class="enemy-area relative" id="enemyArea">
            <!-- 傷害數字容器 -->
            <div class="damage-log-container" id="damageLogContainer"></div>

            <!-- 敵人內容 -->
            <div id="enemyContent" style="width:100%;display:flex;align-items:center;gap:24px;flex-wrap:wrap;justify-content:center;">
                <div class="enemy-avatar" id="enemyAvatar">
                    <span class="emoji-fallback">🪄</span>
                </div>
                <div class="enemy-info">
                    <div class="enemy-name" id="enemyName">
                        <span data-i18n="waiting">等待開始</span>
                        <span class="sub" id="enemySub"></span>
                    </div>
                    <div class="enemy-status-text" id="enemyStatusText" data-i18n="clickStart">點擊「開始冒險」遭遇敵人</div>
                    <div class="enemy-hp-bar">
                        <div class="enemy-hp-fill" id="enemyHpFill" style="width:0%;"></div>
                    </div>
                </div>
            </div>

            <!-- 遊戲結束遮罩 -->
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="big-text" id="gameOverTitle">💀 戰敗</div>
                <div class="sub-text" id="gameOverSub">點擊「開始冒險」重新挑戰</div>
            </div>
        </div>

        <!-- ====== 咒語選擇 ====== -->
        <div class="spell-selector" id="spellSelector">

        // ================================================================

        // ================================================================
        async function buildWsUrl(apiKey, apiSecret, appid, host, path) {
            const date = new Date().toUTCString();
            const requestLine = `GET ${path} HTTP/1.1`;
            const signatureOrigin = `host: ${host}\ndate: ${date}\n${requestLine}`;

            const encoder = new TextEncoder();
            const keyData = encoder.encode(apiSecret);
            const messageData = encoder.encode(signatureOrigin);

            const cryptoKey = await crypto.subtle.importKey(
                'raw', keyData, { name: 'HMAC', hash: 'SHA-256' },
                false, ['sign']
            );
            const signatureBuffer = await crypto.subtle.sign('HMAC', cryptoKey, messageData);
            const signature = btoa(String.fromCharCode(...new Uint8Array(signatureBuffer)));

            const authorization = `api_key="${apiKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
            const authorizationBase64 = btoa(authorization);

            return `wss://${host}${path}?authorization=${encodeURIComponent(authorizationBase64)}&date=${encodeURIComponent(date)}&host=${encodeURIComponent(host)}`;
        }

        // ================================================================
        //  9. PCM 錄音（16kHz / 16bit / 單聲道）
        // ================================================================
        async function startPCMCapture() {
            if (state.audioContext && state.audioContext.state === 'running') {
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                    }
                });
                state.mediaStream = stream;

                const audioCtx = new AudioContext({ sampleRate: 16000 });
                state.audioContext = audioCtx;

                const source = audioCtx.createMediaStreamSource(stream);
                state.sourceNode = source;

                const scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
                state.scriptNode = scriptNode;

                const pcmChunks = [];
                state.pcmChunks = pcmChunks;

                scriptNode.onaudioprocess = (event) => {
                    const inputData = event.inputBuffer.getChannelData(0);
                    const int16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        const s = Math.max(-1, Math.min(1, inputData[i]));
                        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    pcmChunks.push(int16);
                };

                source.connect(scriptNode);
                scriptNode.connect(audioCtx.destination);

                await audioCtx.resume();
                state.isRecording = true;
                dom.btnRecord.classList.add('recording');
                dom.btnRecord.querySelector('span:last-child').textContent = t('stopRecord');
                setFeedback(t('recording'), 'info');

            } catch (err) {
                console.error('錄音啟動失敗:', err);
                setFeedback('❌ ' + (err.message || '無法存取麥克風'), 'error');
                throw err;
            }
        }

        function stopPCMCapture() {
            return new Promise((resolve) => {
                if (!state.isRecording || !state.audioContext) {
                    resolve(null);
                    return;
                }

                state.isRecording = false;
                dom.btnRecord.classList.remove('recording');
                dom.btnRecord.querySelector('span:last-child').textContent = t('startRecord');

                const chunks = state.pcmChunks;
                let totalLen = 0;
                for (const c of chunks) totalLen += c.length;
                const merged = new Int16Array(totalLen);
                let offset = 0;
                for (const c of chunks) {
                    merged.set(c, offset);
                    offset += c.length;
                }

                try {
                    if (state.scriptNode) {
                        state.scriptNode.disconnect();
                        state.scriptNode = null;
                    }
                    if (state.sourceNode) {
                        state.sourceNode.disconnect();
                        state.sourceNode = null;
                    }
                    if (state.audioContext) {
                        state.audioContext.close().catch(() => {});
                        state.audioContext = null;
                    }
                    if (state.mediaStream) {
                        state.mediaStream.getTracks().forEach(t => t.stop());
                        state.mediaStream = null;
                    }
                } catch (e) { /* ignore */ }

                state.pcmChunks = [];
                dom.btnRecord.disabled = true;

                const buffer = merged.buffer;
                resolve(buffer);
            });
        }

        // ================================================================
        //  10. 語音辨識（訊飛 WebSocket）
        // ================================================================
        function recognizeWithXunfei(pcmBuffer, appid, apiKey, apiSecret) {
            return new Promise(async (resolve, reject) => {
                const host = 'iat-api.xfyun.cn';
                const path = '/v2/iat';

                let wsUrl;
                try {
                    wsUrl = await buildWsUrl(apiKey, apiSecret, appid, host, path);
                } catch (err) {
                    reject(new Error('簽名生成失敗: ' + err.message));
                    return;
                }

                const ws = new WebSocket(wsUrl);
                let resolved = false;
                let timeoutId = null;
                let resultText = '';

                const cleanup = () => {
                    if (timeoutId) { clearTimeout(timeoutId);
                        timeoutId = null; }
                    if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
                        try { ws.close(); } catch (e) { /* ignore */ }
                    }
                };

                const finish = (err, text) => {
                    if (resolved) return;
                    resolved = true;
                    cleanup();
                    if (err) reject(err);
                    else resolve(text || '');
                };

                timeoutId = setTimeout(() => {
                    finish(new Error('辨識超時（20秒）'));
                }, 20000);

                ws.onopen = () => {
                    const startFrame = {
                        common: { app_id: appid },
                        business: { language: 'zh_cn', domain: 'iat', accent: 'mandarin' },
                        data: { status: 0, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' }
                    };
                    ws.send(JSON.stringify(startFrame));

                    const audioData = new Uint8Array(pcmBuffer);
                    const chunkSize = 4000;
                    let offset = 0;
                    const totalLen = audioData.length;

                    function sendNextChunk() {
                        if (resolved) return;
                        if (offset >= totalLen) {
                            const endFrame = {
                                data: { status: 2, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' }
                            };
                            ws.send(JSON.stringify(endFrame));
                            return;
                        }
                        const end = Math.min(offset + chunkSize, totalLen);
                        const chunk = audioData.slice(offset, end);
                        const base64 = btoa(String.fromCharCode(...chunk));
                        const frame = {
                            data: {
                                status: 1,
                                format: 'audio/L16;rate=16000',
                                encoding: 'raw',
                                audio: base64
                            }
                        };
                        ws.send(JSON.stringify(frame));
                        offset = end;
                        if (offset < totalLen) {
                            setTimeout(sendNextChunk, 10);
                        } else {
                            const endFrame = {
                                data: { status: 2, format: 'audio/L16;rate=16000', encoding: 'raw', audio: '' }
                            };
                            ws.send(JSON.stringify(endFrame));
                        }
                    }

                    setTimeout(sendNextChunk, 50);
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.code && msg.code !== 0) {
                            finish(new Error(`訊飛錯誤: ${msg.code} - ${msg.message || '未知'}`));
                            return;
                        }

                        if (msg.data && msg.data.result && msg.data.result.ws) {
                            const wsArr = msg.data.result.ws;
                            let text = '';
                            for (const w of wsArr) {
                                if (w.cw) {
                                    for (const cw of w.cw) {
                                        if (cw.w) text += cw.w;
                                    }
                                }
                            }
                            if (text) {
                                resultText = text;
                            }
                        }

                        if (msg.data && msg.data.status === 2) {
                            finish(null, resultText);
                        }
                    } catch (err) {
                        finish(new Error('解析回應失敗: ' + err.message));
                    }
                };

                ws.onerror = (err) => {
                    finish(new Error('WebSocket 連線錯誤'));
                };

                ws.onclose = () => {
                    if (!resolved) {
                        finish(new Error('連線已關閉'));
                    }
                };
            });
        }

        // ================================================================
        //  11. 評分（逐字比對）
        // ================================================================
        function evaluateSpell(recognizedText, targetSpell) {
            const targetSimplified = toSimplified(targetSpell);
            const cleanTarget = removePunctuation(targetSimplified);
            const cleanRecognized = removePunctuation(recognizedText);

            const len = Math.min(cleanTarget.length, cleanRecognized.length);
            let matchCount = 0;
            for (let i = 0; i < len; i++) {
                if (cleanTarget[i] === cleanRecognized[i]) matchCount++;
            }
            const total = cleanTarget.length;
            const score = total > 0 ? Math.round((matchCount / total) * 100) : 0;
            return { score, matchCount, total, recognized: cleanRecognized, target: cleanTarget };
        }

            let isCritical = false;
            let killed = false;
            let playerLostLife = false;

            switch (effect) {
                case 'effective':
                    damage = Math.round(score * 1.0);
                    break;
                case 'weak':
                    damage = Math.round(score * 0.5);
                    break;
                case 'ineffective':
                    damage = 0;
                    break;
                case 'overkill':
                    damage = Math.round(score * 5);
                    state.score = Math.max(0, state.score - 5);
                    isCritical = true;
                    break;
                default:
                    damage = 0;
            }

            const actualDamage = Math.min(damage, state.enemyHp);
            state.enemyHp -= actualDamage;

            // 判斷是否擊殺
            if (state.enemyHp <= 0 || damage >= 60) {
                state.enemyHp = 0;
                killed = true;
                let bonus = 10;
                if (score >= 90) bonus += 5;
                else if (score >= 75) bonus += 2;
                state.score += bonus;
                setFeedback(t('scoreGain', { n: bonus }) + ' 🎉', 'success');
            }

            // ---- 處理狀態切換 ----

            // 1. 無效攻擊：直接反擊，不顯示攻擊效果
            if (effect === 'ineffective') {
                // 記錄反擊傷害（但無效攻擊本身無傷害，不記錄攻擊傷害）
                // 直接反擊
                state.enemyStatus = 'attacking';
                state.lives -= 1;
                playerLostLife = true;
                state.damageLogs.push({ text: '💥 -1', cls: 'heal' });
                if (state.lives <= 0) {
                    state.lives = 0;
                    state.gameOver = true;
                }
                renderEnemy();
                updateUI();
                state.battleProcessing = false;
                // 如果游戏结束，显示遮罩
                if (state.gameOver) {
                    showGameOver(false);
                }
                return;
            }

            // 2. 有效/弱效/超效：先顯示攻擊效果
            let attackStatus = 'default';
            if (effect === 'effective') attackStatus = 'expelliarmus';
            else if (effect === 'weak') attackStatus = 'stupefy';
            else if (effect === 'overkill') attackStatus = 'petrificus';
            else attackStatus = 'default';

            // 記錄攻擊傷害（如果是超效，傷害可能為0？但overkill會造成大量傷害，但我們已經計算了actualDamage）
            let damageText = `-${actualDamage}`;
            let damageCls = '';
            if (killed) damageCls = 'critical';
            else if (actualDamage === 0) damageCls = 'ineffective';
            if (!killed && actualDamage === 0) {
                // 如果是0伤害且未击杀，通常不会发生，但以防万一
                damageCls = 'ineffective';
            }
            state.damageLogs.push({ text: damageText, cls: damageCls });

            // 設置攻擊狀態並渲染
            state.enemyStatus = attackStatus;
            renderEnemy();
            updateUI();

            // 等待2秒顯示攻擊效果
            await sleep(2000);

            // 3. 根據擊殺或反擊決定後續狀態
            if (killed) {
                // 擊殺 -> 顯示擊敗圖片
                state.enemyStatus = 'defeated';
                state.enemyDefeated = true;
                renderEnemy();
                updateUI();
                state.battleProcessing = false;
                return;
            } else {
                // 未擊殺：判斷是否反擊
                let counterAttack = false;
                if (effect === 'weak') {
                    if (Math.random() >= 0.5) counterAttack = true;
                } else if (effect === 'effective' || effect === 'overkill') {
                    counterAttack = false;
                } else {
                    counterAttack = false;
                }

                if (counterAttack) {
                    state.enemyStatus = 'attacking';
                    state.lives -= 1;
                    playerLostLife = true;
                    state.damageLogs.push({ text: '💥 -1', cls: 'heal' });
                    if (state.lives <= 0) {
                        state.lives = 0;
                        state.gameOver = true;
                    }
                    renderEnemy();
                    updateUI();
                    if (state.gameOver) {
                        showGameOver(false);
                    }
                } else {
                    // 不反擊，恢復預設
                    state.enemyStatus = 'default';
                    renderEnemy();
                    updateUI();
                }
                state.battleProcessing = false;
                return;
            }
        }

        // ================================================================
        //  13. UI 更新
        // ================================================================
        function updateUI() {
            dom.scoreDisplay.textContent = state.score;
            dom.livesDisplay.textContent = state.lives;
            dom.livesDisplay.style.color = state.lives <= 1 ? '#ff6b5a' : '#f0e6d3';

            updateButtonsLang();

            const hasEnemy = state.currentEnemy && state.enemyHp > 0 && !state.enemyDefeated && !state.gameOver;
            const canRecord = hasEnemy && !state.isRecording && !state.recognizing && !state.evaluating && !state
                .battleProcessing;
            dom.btnRecord.disabled = !canRecord;

            document.querySelectorAll('.spell-btn').forEach(el => {
                const pos = el.dataset.pos;
                el.classList.toggle('active', pos === state.selectedPos);
                const enabled = hasEnemy && !state.battleProcessing;
                el.style.opacity = enabled ? '1' : '0.4';
                el.style.pointerEvents = enabled ? 'auto' : 'none';
            });

            if (state.gameOver) {
                dom.btnAdventure.textContent = t('restart');
                dom.btnAdventure.className = 'btn-primary danger';
            } else if (state.enemyDefeated || !state.currentEnemy) {
                dom.btnAdventure.textContent = t('startAdventure');
                dom.btnAdventure.className = 'btn-primary';
            } else {
                dom.btnAdventure.textContent = t('nextBattle');
                dom.btnAdventure.className = 'btn-primary';
            }

            // 戰鬥處理中禁用冒險按鈕
            dom.btnAdventure.disabled = state.battleProcessing;
        }

        function renderEnemy() {
            const enemy = state.currentEnemy || state.lastEnemy;
            const content = dom.enemyContent;

            // 更新傷害日誌
            const logContainer = dom.damageLogContainer;
            logContainer.innerHTML = '';
            // 顯示最新的傷害在下面（按順序）
            for (const log of state.damageLogs) {
                const item = document.createElement('div');
                item.className = 'damage-item' + (log.cls ? ' ' + log.cls : '');
                item.textContent = log.text;
                logContainer.appendChild(item);
            }

            if (!enemy) {
                dom.enemyAvatar.innerHTML = `<span class="emoji-fallback">🪄</span>`;
                dom.enemyName.innerHTML =
                    `<span data-i18n="waiting">${t('waiting')}</span><span class="sub" id="enemySub"></span>`;
                dom.enemyStatusText.textContent = t('clickStart');
                dom.enemyHpFill.style.width = '0%';
                dom.enemyHpFill.className = 'enemy-hp-fill';
                return;
            }

            const name = getEnemyName(enemy);
            const hint = getEnemyHint(enemy);
            const hpPercent = state.enemyHp > 0 ? (state.enemyHp / enemy.hp) * 100 : 0;

            const statusIdx = STATUS_INDEX[state.enemyStatus] ?? 0;
            const imgPath = `images/${enemy.id}_${statusIdx}.png`;
            const avatarEl = dom.enemyAvatar;
            const img = document.createElement('img');
            img.onload = () => {
                avatarEl.innerHTML = '';
                avatarEl.appendChild(img);
            };
            img.onerror = () => {
                avatarEl.innerHTML = `<span class="emoji-fallback">${enemy.emoji}</span>`;
            };
            img.src = imgPath;
            img.alt = name;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';

            dom.enemyName.innerHTML = `
                <span>${name}</span>
                <span class="sub">${hint ? '✨ ' + hint : ''}</span>
            `;

            let statusText = '';
            if (state.enemyStatus === 'defeated') {
                statusText = t('enemyDefeated');
            } else if (state.enemyStatus === 'attacking') {
                statusText = t('enemyAttacking');
            } else if (state.enemyStatus !== 'default') {
                const effectMap = {
                    'expelliarmus': t('effect_effective'),
                    'stupefy': t('effect_weak'),
                    'petrificus': t('effect_overkill'),
                    'patronus': t('effect_effective'),
                };
                statusText = effectMap[state.enemyStatus] || '';
            } else {
                statusText = `${t('hp')}: ${state.enemyHp}/${enemy.hp}`;
            }
            dom.enemyStatusText.textContent = statusText;

            dom.enemyHpFill.style.width = Math.max(0, hpPercent) + '%';
            dom.enemyHpFill.className = 'enemy-hp-fill' + (hpPercent < 25 ? ' low' : '');

            if (state.gameOver) {
                showGameOver(false);
            } else {
                dom.gameOverOverlay.classList.remove('show');
            }

            updateUI();
        }

        function updateSpellDisplay() {
            const display = dom.spellDisplay;
            if (!state.selectedPos) {
                display.innerHTML = `<div class="empty-hint" data-i18n="selectSpell">${t('selectSpell')}</div>`;
                return;
            }
            const spellInfo = getSpellDisplay(state.selectedPos);
            const spellKey = POS_TO_SPELL[state.selectedPos];
            const effect = state.currentEnemy ? SPELLS[spellKey]?.effects[state.currentEnemy.id] : null;
            const effectText = effect ? getEffectText(effect) : '';

            display.innerHTML = `
                <div class="spell-chars">${spellInfo.chars}</div>
                <div class="spell-pinyin">${spellInfo.pinyin}</div>
                <div class="spell-hint">${effectText ? '⚡ ' + effectText : ''}</div>
            `;
        }

        function setFeedback(msg, type = '') {
            const el = dom.feedback;
            el.textContent = msg;
            el.className = 'feedback' + (type ? ' ' + type : '');
        }

        function showGameOver(victory) {
            const overlay = dom.gameOverOverlay;
            overlay.classList.add('show');
            if (victory) {
                dom.gameOverTitle.textContent = t('victory');
                dom.gameOverSub.textContent = t('scoreGain', { n: state.score });
            } else {
                dom.gameOverTitle.textContent = t('gameOver');
                dom.gameOverSub.textContent = t('gameOverSub');
            }
        }

        function updateStatusText() {
            renderEnemy();
            updateSpellDisplay();
            setFeedback(t('ready'), '');
        }

        // ================================================================
        //  14. 核心流程：冒險、戰鬥、語音
        // ================================================================

        function startAdventure() {
            if (state.gameOver) {
                resetGame();
                return;
            }

            if (state.enemyDefeated || !state.currentEnemy) {
                spawnEnemy();
            } else {
                if (state.enemyHp > 0 && !state.enemyDefeated) {
                    setFeedback('⚠️ 請先擊敗當前敵人！', 'error');
                    return;
                }
                spawnEnemy();
            }
        }

        function spawnEnemy() {
            // 清空傷害日誌
            state.damageLogs = [];

            let available = ENEMIES;
            if (state.lastEnemy) {
                available = ENEMIES.filter(e => e.id !== state.lastEnemy.id);
            }
            if (available.length === 0) available = ENEMIES;
            const enemy = available[Math.floor(Math.random() * available.length)];

            state.currentEnemy = enemy;
            state.lastEnemy = enemy;
            state.enemyHp = enemy.hp;
            state.enemyStatus = 'default';
            state.enemyDefeated = false;
            state.battleLocked = false;
            state.gameOver = false;
            state.selectedPos = null;
            state.currentSpellKey = null;
            state.battleProcessing = false;

            dom.gameOverOverlay.classList.remove('show');

            document.querySelectorAll('.spell-btn').forEach(el => el.classList.remove('active'));
            updateSpellDisplay();

            renderEnemy();
            setFeedback(`⚔️ ${getEnemyName(enemy)} 出現了！`, 'info');
            updateUI();

            dom.btnRecord.disabled = true;
        }

        function resetGame() {
            state.score = 0;
            state.lives = 3;
            state.gameOver = false;
            state.enemyDefeated = false;
            state.currentEnemy = null;
            state.lastEnemy = null;
            state.enemyHp = 0;
            state.enemyStatus = 'default';
            state.selectedPos = null;
            state.currentSpellKey = null;
            state.battleLocked = false;
            state.battleProcessing = false;
            state.damageLogs = [];

            dom.gameOverOverlay.classList.remove('show');
            dom.btnAdventure.className = 'btn-primary';

            renderEnemy();
            updateSpellDisplay();
            setFeedback(t('ready'), '');
            updateUI();
            dom.btnRecord.disabled = true;
        }

        function selectSpell(pos) {
            if (state.gameOver || !state.currentEnemy || state.enemyDefeated) {
                setFeedback('⚠️ ' + (state.gameOver ? t('gameOver') : t('clickStart')), 'error');
                return;
            }
            if (state.isRecording || state.recognizing || state.battleProcessing) {
                setFeedback('⏳ 請先完成目前動作', 'error');
                return;
            }

            state.selectedPos = pos;
            state.currentSpellKey = POS_TO_SPELL[pos];

            document.querySelectorAll('.spell-btn').forEach(el => {
                el.classList.toggle('active', el.dataset.pos === pos);
            });
            updateSpellDisplay();
            dom.btnRecord.disabled = false;
            setFeedback(`✨ ${t('spellHint')}: ${getSpellDisplay(pos).chars}`, 'info');
        }

        async function toggleRecording() {
            if (state.isRecording) {
                await stopAndRecognize();
                return;
            }

            if (!state.currentEnemy || state.enemyHp <= 0 || state.enemyDefeated || state.gameOver) {
                setFeedback('⚠️ ' + t('clickStart'), 'error');
                return;
            }
            if (!state.selectedPos) {
                setFeedback('👆 ' + t('selectSpell'), 'error');
                return;
            }
            if (state.battleProcessing) {
                setFeedback('⏳ 戰鬥進行中，請稍候', 'error');
                return;
            }

            try {
                await startPCMCapture();
                dom.btnRecord.disabled = false;
                dom.btnRecord.querySelector('span:last-child').textContent = t('stopRecord');
                setFeedback(t('recording'), 'info');
            } catch (err) {
                setFeedback('❌ ' + (err.message || '錄音失敗'), 'error');
                dom.btnRecord.disabled = true;
            }
        }

        async function stopAndRecognize() {
            if (!state.isRecording) return;
            if (state.recognizing || state.evaluating || state.battleProcessing) return;

            dom.btnRecord.disabled = true;
            setFeedback(t('recognizing'), 'info');
            state.recognizing = true;

            try {
                const pcmBuffer = await stopPCMCapture();
                if (!pcmBuffer || pcmBuffer.byteLength === 0) {
                    setFeedback('⚠️ 沒有錄到聲音，請再試一次', 'error');
                    state.recognizing = false;
                    dom.btnRecord.disabled = false;
                    dom.btnRecord.querySelector('span:last-child').textContent = t('startRecord');
                    return;
                }

                setFeedback(t('recognizing') + ' ...', 'info');
                const recognizedText = await recognizeWithXunfei(pcmBuffer, APPID, API_KEY, API_SECRET);
                state.recognizing = false;

                if (!recognizedText || recognizedText.trim() === '') {
                    setFeedback('⚠️ 未辨識到語音，請再試一次', 'error');
                    dom.btnRecord.disabled = false;
                    dom.btnRecord.querySelector('span:last-child').textContent = t('startRecord');
                    return;
                }

                const targetSpell = state.currentSpellKey;
                const evalResult = evaluateSpell(recognizedText, targetSpell);
                const score = evalResult.score;

                setFeedback(`📊 ${t('score_label')}: ${score}%  (${evalResult.matchCount}/${evalResult.total})`, 'info');

                const displayMsg = `${t('recognitionResult')}: "${recognizedText}"  |  ${t('matchRate')}: ${score}%`;
                setFeedback(displayMsg, score >= 60 ? 'success' : 'error');

                const enemy = state.currentEnemy;
                if (enemy && state.enemyHp > 0) {
                    const spell = SPELLS[targetSpell];
                    const effect = spell?.effects[enemy.id] || 'ineffective';
                    // 進入戰鬥處理（異步，包含延遲）
                    await processBattle(effect, targetSpell, enemy, score);
                    // 戰鬥處理完成後，更新UI
                    renderEnemy();
                    updateUI();
                    // 如果遊戲結束，顯示遮罩
                    if (state.gameOver) {
                        showGameOver(false);
                    }
                    // 如果敵人被擊敗，啟用冒險按鈕
                    if (state.enemyDefeated) {
                        dom.btnAdventure.disabled = false;
                    }
                    // 重新啟用錄音按鈕（如果條件允許）
                    const hasEnemy = state.currentEnemy && state.enemyHp > 0 && !state.enemyDefeated && !state.gameOver;
                    dom.btnRecord.disabled = !(hasEnemy && !state.battleProcessing && state.selectedPos);
                    dom.btnRecord.querySelector('span:last-child').textContent = t('startRecord');
                }

            } catch (err) {
                console.error('辨識錯誤:', err);
                setFeedback('❌ ' + (err.message || '辨識失敗，請再試一次'), 'error');
                state.recognizing = false;
                dom.btnRecord.disabled = false;
                dom.btnRecord.querySelector('span:last-child').textContent = t('startRecord');
                if (state.isRecording) {
                    try { await stopPCMCapture(); } catch (e) { /* ignore */ }
                }
            } finally {
                state.recognizing = false;
                if (state.isRecording) {
                    try { await stopPCMCapture(); } catch (e) { /* ignore */ }
                }
                dom.btnRecord.classList.remove('recording');
                dom.btnRecord.querySelector('span:last-child').textContent = t('startRecord');
                const hasEnemy = state.currentEnemy && state.enemyHp > 0 && !state.enemyDefeated && !state.gameOver;
                dom.btnRecord.disabled = !(hasEnemy && !state.battleProcessing && state.selectedPos);
                updateUI();
            }
        }

        // ================================================================
        //  15. 事件綁定
        // ================================================================
        function initEvents() {
            dom.langToggle.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn || !btn.dataset.lang) return;
                if (btn.dataset.lang === currentLang) return;
                setLang(btn.dataset.lang);
            });

            dom.btnAdventure.addEventListener('click', startAdventure);

            dom.spellSelector.addEventListener('click', (e) => {
                const btn = e.target.closest('.spell-btn');
                if (!btn || !btn.dataset.pos) return;
                selectSpell(btn.dataset.pos);
            });

            dom.btnRecord.addEventListener('click', toggleRecording);

            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (!dom.btnRecord.disabled) {
                        dom.btnRecord.click();
                    }
                }
            });
        }

        // ================================================================
        //  16. 初始化
        // ================================================================
        function init() {
            setLang('zh');
            resetGame();
            initEvents();
            updateUI();
            setFeedback(t('ready'), '');
            dom.btnRecord.disabled = true;
            console.log('⚡ 哈利波特 · 魔法對決 已啟動 (全屏模式)');
            console.log('📖 請確保在 HTTPS 環境下運行，並允許麥克風權限');
        }

        document.addEventListener('DOMContentLoaded', init);

        window.__state = state;
        window.__debug = {
            startAdventure,
            selectSpell,
            toggleRecording,
            resetGame,
            renderEnemy,
            updateUI,
            setLang,
        };
    </script>

</body>
