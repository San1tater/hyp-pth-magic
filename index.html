    <style>
        /* (样式保持与之前一致，为节省篇幅已压缩，但功能不变) */
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans TC','Segoe UI',sans-serif;background:#0a0a12;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}.container{width:100vw;height:100vh;max-width:100%;background:linear-gradient(160deg,#1a1025,#0f0a1a);border:2px solid #b8963a;padding:16px 20px;display:flex;flex-direction:column;overflow-y:auto}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-shrink:0}.header h1{font-family:'MedievalSharp',cursive;font-size:2.2rem;background:linear-gradient(180deg,#f5d98a,#c9a050);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px}.header h1 small{font-size:1rem;-webkit-text-fill-color:#b8963a;opacity:.7}.lang-switch{background:rgba(255,255,255,0.06);border:1px solid rgba(184,150,58,0.25);border-radius:30px;padding:4px 14px;color:#ddd0c0;font-size:.8rem;cursor:pointer;font-family:inherit;transition:.2s}.lang-switch:hover{border-color:#b8963a;background:rgba(184,150,58,0.1)}.status-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.04);border-radius:60px;padding:6px 16px;margin-bottom:12px;border:1px solid rgba(184,150,58,0.15);flex-shrink:0;flex-wrap:wrap;gap:6px}.status-bar .stat{display:flex;align-items:center;gap:6px;color:#ddd0c0;font-size:.9rem}.status-bar .stat .value{font-weight:700;color:#f5d98a;font-size:1.1rem;min-width:20px}.status-bar .btn-start{background:linear-gradient(135deg,#b8963a,#8a6f2a);border:none;color:#1a1025;font-weight:700;padding:6px 24px;border-radius:40px;cursor:pointer;transition:.25s;font-family:inherit;font-size:.9rem}.status-bar .btn-start:hover{transform:scale(1.04);box-shadow:0 6px 25px rgba(184,150,58,0.45)}.status-bar .btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none}.enemy-area{background:rgba(0,0,0,0.5);border-radius:28px;padding:16px 20px 14px;margin-bottom:12px;border:1px solid rgba(184,150,58,0.12);text-align:center;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:visible}.enemy-avatar-wrap{min-height:120px;display:flex;align-items:center;justify-content:center;width:100%;position:relative}.enemy-area .enemy-img{width:120px;height:120px;object-fit:contain;filter:drop-shadow(0 0 40px rgba(184,150,58,0.15));transition:transform .3s;max-width:100%}.enemy-area .enemy-img:hover{transform:scale(1.05)}.enemy-area .enemy-name{font-size:1.6rem;font-weight:700;color:#f5d98a;margin:2px 0 0}.enemy-area .enemy-status{font-size:.9rem;color:#b0a090}.enemy-area .enemy-hint{font-size:.75rem;color:#806850;margin-top:2px}.enemy-area .empty-hint{color:#706050;font-size:1.1rem;opacity:.5;letter-spacing:2px}.hp-bar-wrap{width:100%;max-width:300px;height:14px;background:rgba(60,20,20,0.7);border-radius:20px;margin:8px auto 2px;overflow:hidden;border:1px solid rgba(184,150,58,0.15);position:relative}.hp-bar-fill{height:100%;width:100%;background:linear-gradient(90deg,#e04040,#f08060);border-radius:20px;transition:width .45s ease;position:relative}.hp-bar-fill.low{background:linear-gradient(90deg,#c02020,#e05050)}.hp-bar-fill.mid{background:linear-gradient(90deg,#d08030,#f0a050)}.hp-bar-fill.high{background:linear-gradient(90deg,#40a060,#60d080)}.hp-text{font-size:.7rem;color:#ddd0c0;opacity:.7;letter-spacing:1px;margin-top:2px}.damage-float{position:absolute;top:10%;left:50%;transform:translateX(-50%);font-size:2.8rem;font-weight:900;pointer-events:none;opacity:0;z-index:20;text-shadow:0 0 30px rgba(255,60,60,0.6),0 4px 20px rgba(0,0,0,0.8);animation:floatUp 1.2s ease-out forwards}.damage-float.heal{color:#60e090;text-shadow:0 0 30px rgba(60,220,120,0.5),0 4px 20px rgba(0,0,0,0.8)}.damage-float.critical{color:#ffd040;text-shadow:0 0 50px rgba(255,200,60,0.7),0 4px 20px rgba(0,0,0,0.8);font-size:3.6rem}@keyframes floatUp{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(.8)}40%{opacity:1;transform:translateX(-50%) translateY(-60px) scale(1.2)}100%{opacity:0;transform:translateX(-50%) translateY(-140px) scale(1)}}.positions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;flex-shrink:0}.positions .pos-btn{background:rgba(255,255,255,0.04);border:1.5px solid rgba(184,150,58,0.2);border-radius:20px;padding:10px 4px;cursor:pointer;transition:.25s;text-align:center;color:#ddd0c0;font-family:inherit;font-size:.8rem;backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;user-select:none}.positions .pos-btn .pos-icon{font-size:2rem}.positions .pos-btn .pos-label{font-weight:400;font-size:.75rem;color:#c0b0a0}.positions .pos-btn:hover:not(:disabled){background:rgba(184,150,58,0.12);border-color:#b8963a;transform:translateY(-2px)}.positions .pos-btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}.positions .pos-btn.active{background:rgba(184,150,58,0.18);border-color:#f5d98a;box-shadow:0 0 30px rgba(184,150,58,0.08)}.positions .pos-btn.defense{border-color:rgba(80,180,200,0.3);background:rgba(80,180,200,0.06)}.positions .pos-btn.defense:hover:not(:disabled){border-color:#60c8e0;background:rgba(80,180,200,0.15)}.positions .pos-btn.defense.active{border-color:#80d8f0;background:rgba(80,180,200,0.2)}.spell-display{background:rgba(0,0,0,0.45);border-radius:20px;padding:10px 16px;margin-bottom:10px;border:1px solid rgba(184,150,58,0.1);min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}.spell-display .spell-char{font-size:1.8rem;font-weight:700;color:#f5d98a;letter-spacing:6px}.spell-display .spell-pinyin{font-size:.95rem;color:#c0b0a0;letter-spacing:3px;opacity:.7}.spell-display .spell-hint{font-size:.7rem;color:#806850}.spell-display .spell-empty{color:#605040;font-size:.85rem;opacity:.5}.action-row{display:flex;gap:12px;margin-bottom:12px;flex-shrink:0;flex-wrap:wrap}.action-row .btn-record{flex:1;min-width:120px;background:linear-gradient(135deg,#8a3a4a,#5a2a3a);border:1px solid rgba(200,100,120,0.3);border-radius:60px;padding:12px 16px;font-size:1rem;font-weight:700;color:#f5e0d0;cursor:pointer;transition:.25s;font-family:inherit;letter-spacing:2px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(138,58,74,0.2)}.action-row .btn-record:hover:not(:disabled){transform:scale(1.02);border-color:rgba(220,140,160,0.4)}.action-row .btn-record:disabled{opacity:.35;cursor:not-allowed;transform:none!important}.action-row .btn-record.recording{background:linear-gradient(135deg,#c04040,#802020);animation:pulse 1s infinite;border-color:#ff6060}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(200,60,60,0.3)}50%{box-shadow:0 0 50px rgba(200,60,60,0.6)}}.action-row .feedback{flex:1.2;min-width:100px;padding:8px 14px;border-radius:16px;background:rgba(0,0,0,0.3);color:#ddd0c0;font-size:.85rem;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.04);word-break:break-word}.action-row .feedback.success{color:#7ddfa0;border-color:rgba(100,220,150,0.2);background:rgba(60,180,100,0.08)}.action-row .feedback.fail{color:#ef8a8a;border-color:rgba(220,100,100,0.2);background:rgba(180,60,60,0.08)}.action-row .feedback.info{color:#b0c8e8;border-color:rgba(100,150,220,0.15);background:rgba(60,100,180,0.06)}.action-row .feedback.warn{color:#f0d080;border-color:rgba(220,200,80,0.15);background:rgba(180,160,60,0.06)}@media (max-width:480px){.header h1{font-size:1.6rem}.header h1 small{font-size:.7rem}.positions{grid-template-columns:repeat(4,1fr);gap:5px}.positions .pos-btn{padding:8px 2px;font-size:.7rem}.positions .pos-btn .pos-icon{font-size:1.6rem}.status-bar{font-size:.7rem;padding:4px 12px}.action-row{flex-direction:column}.action-row .btn-record{width:100%;min-width:unset}.action-row .feedback{width:100%;min-height:36px;font-size:.8rem}.enemy-area .enemy-img{width:80px;height:80px}.enemy-area .enemy-name{font-size:1.3rem}.enemy-area{min-height:160px;padding:12px 14px}.enemy-avatar-wrap{min-height:80px}.spell-display .spell-char{font-size:1.4rem}.hp-bar-wrap{max-width:200px;height:10px}.damage-float{font-size:2rem}.damage-float.critical{font-size:2.6rem}}@media (max-width:380px){.enemy-area .enemy-img{width:60px;height:60px}.enemy-area{min-height:130px;padding:8px 10px}.enemy-avatar-wrap{min-height:60px}.positions .pos-btn .pos-icon{font-size:1.3rem}.status-bar .stat{font-size:.6rem}.status-bar .btn-start{font-size:.7rem;padding:4px 14px}}
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>⚡ 哈利波特 <small>魔法對決</small></h1>
        <button class="lang-switch" id="langToggle">EN / 中</button>
    </div>
    <div class="status-bar">
        <div class="stat"><span class="icon">🏆</span><span id="scoreLabel">分數</span><span class="value" id="scoreDisplay">0</span></div>
        <div class="stat"><span class="icon">❤️</span><span id="livesLabel">生命</span><span class="value" id="livesDisplay">3</span></div>
        <button class="btn-start" id="btnStart">開始冒險</button>
    </div>
    <div class="enemy-area" id="enemyArea"><div class="empty-hint">🪄 點擊「開始冒險」迎接挑戰</div></div>
    <div class="positions" id="positionsContainer">
        <button class="pos-btn" data-pos="wand" id="posWand" disabled><span class="pos-icon">🪄</span><span class="pos-label" id="labelWand">魔杖</span></button>
        <button class="pos-btn" data-pos="body" id="posBody" disabled><span class="pos-icon">🧍</span><span class="pos-label" id="labelBody">身體</span></button>
        <button class="pos-btn" data-pos="forehead" id="posForehead" disabled><span class="pos-icon">👁</span><span class="pos-label" id="labelForehead">額頭</span></button>
        <button class="pos-btn defense" data-pos="defense" id="posDefense" disabled><span class="pos-icon">🛡️</span><span class="pos-label" id="labelDefense">自衛</span></button>
    </div>
    <div class="spell-display" id="spellDisplay"><div class="spell-empty" id="spellEmpty">🔮 選擇一個部位以顯示咒語</div></div>
    <div class="action-row">
        <button class="btn-record" id="btnRecord" disabled><span class="mic-icon">🎤</span><span id="recordLabel">開始唸咒</span></button>
        <div class="feedback" id="feedbackDisplay">💬 等待你的行動…</div>
    </div>
</div>
<script>
(function(){
'use strict';

// ========== 多語言 ==========
const LANG={
zh:{score:'分數',lives:'生命',start:'開始冒險',enemy_default:'🪄 點擊「開始冒險」迎接挑戰',wand:'魔杖',body:'身體',forehead:'額頭',defense:'自衛',spell_empty:'🔮 選擇一個部位以顯示咒語',record:'開始唸咒',recording:'停止錄音',feedback_wait:'💬 等待你的行動…',feedback_encounter:'⚔️ 遭遇了 {name}！選擇咒語！',feedback_spell_ready:'🔮 準備唸出「{spell}」',feedback_listening:'🎤 錄音中，再次點擊按鈕停止…',feedback_score:'📊 評分：{score} 分',feedback_fail:'❌ 錯誤: {err}',feedback_weak:'⚠️ 「{spell}」效果微弱！',feedback_dodge:'🌀 成功閃避反擊！再試一次！',feedback_dodge_fail:'💥 閃避失敗，遭受反擊！',feedback_ineffective:'💔 「{spell}」對 {enemy} 無效！',feedback_overkill:'🔥 「{spell}」過度強大！不被鼓勵！',feedback_overkill_penalty:'⚖️ 濫用強大咒語，扣除 5 分。',feedback_hit:'💀 反擊命中！剩餘生命：{lives}',feedback_gameover:'💀 你倒下了… 點擊「開始冒險」重來',feedback_retry:'🔄 繼續挑戰 {name}，選擇咒語！',feedback_restart:'🔄 遊戲重啟！',feedback_victory:'🎉 成功擊敗 {name}！ +{score} 分{bonus}',bonus_perfect:' 🌟 完美咒語！額外 +5 分！',bonus_great:' ✨ 出色的咒語！額外 +2 分！',feedback_next:'⚔️ 準備迎接下一場戰鬥！',enemy_status_default:'現身',enemy_status_expelliarmus:'被除你武器',enemy_status_stupefy:'被昏昏倒地',enemy_status_petrificus:'被統統石化',enemy_status_patronus:'被呼神護衛',enemy_status_attacking:'攻擊！',enemy_status_defeated:'被擊敗',feedback_stopping:'⏹️ 錄音停止，傳送評測…',feedback_connecting:'📡 連線訊飛評測中…',hp_label:'生命值'},
en:{score:'Score',lives:'Lives',start:'Start',enemy_default:'🪄 Click "Start" to begin',wand:'Wand',body:'Body',forehead:'Forehead',defense:'Defense',spell_empty:'🔮 Select a body part',record:'Record',recording:'Stop',feedback_wait:'💬 Awaiting action…',feedback_encounter:'⚔️ Encountered {name}! Choose a spell!',feedback_spell_ready:'🔮 Ready to cast "{spell}"',feedback_listening:'🎤 Recording… click again to stop',feedback_score:'📊 Score: {score}',feedback_fail:'❌ Error: {err}',feedback_weak:'⚠️ "{spell}" weak effect!',feedback_dodge:'🌀 Dodged counterattack! Try again!',feedback_dodge_fail:'💥 Failed to dodge!',feedback_ineffective:'💔 "{spell}" no effect on {enemy}!',feedback_overkill:'🔥 "{spell}" overkill! Not encouraged!',feedback_overkill_penalty:'⚖️ Penalty -5 points.',feedback_hit:'💀 Hit! Lives left: {lives}',feedback_gameover:'💀 You fell… Click "Start" to restart',feedback_retry:'🔄 Continue fighting {name}, choose a spell!',feedback_restart:'🔄 Game restarted!',feedback_victory:'🎉 Defeated {name}! +{score} pts{bonus}',bonus_perfect:' 🌟 Perfect! Extra +5 pts!',bonus_great:' ✨ Great! Extra +2 pts!',feedback_next:'⚔️ Next battle!',enemy_status_default:'Appeared',enemy_status_expelliarmus:'Disarmed',enemy_status_stupefy:'Stunned',enemy_status_petrificus:'Petrified',enemy_status_patronus:'Patronus',enemy_status_attacking:'Attacking!',enemy_status_defeated:'Defeated',feedback_stopping:'⏹️ Recording stopped, evaluating…',feedback_connecting:'📡 Connecting to evaluation server…',hp_label:'HP'}
};
let lang='zh';
function t(k,p){let s=LANG[lang][k]||k;if(p)for(let k in p)s=s.replace(new RegExp('\\{'+k+'\\}','g'),p[k]);return s;}

// ========== 遊戲數據 ==========
const ENEMIES=[
{id:'dementor',name_zh:'攝魂怪',name_en:'Dementor',emoji:'👻',desc_zh:'黑暗化身',desc_en:'Darkness',hint_zh:'守護之力',hint_en:'Patronus',hp:60},
{id:'voldemort',name_zh:'伏地魔',name_en:'Voldemort',emoji:'🐍',desc_zh:'黑魔王',desc_en:'Dark Lord',hint_zh:'解除武器',hint_en:'Disarm',hp:60},
{id:'malfoy',name_zh:'馬爾福',name_en:'Malfoy',emoji:'🧙‍♂️',desc_zh:'食死徒',desc_en:'Death Eater',hint_zh:'冷靜',hint_en:'Calm',hp:60}
];
const SPELLS={
'除你武器':{pinyin:'chú nǐ wǔ qì',pos:'wand',label_zh:'魔杖',label_en:'Wand',effects:{dementor:'ineffective',voldemort:'effective',malfoy:'weak'},desc_zh:'繳械咒',desc_en:'Disarm'},
'統統石化':{pinyin:'tōng tōng shí huà',pos:'body',label_zh:'身體',label_en:'Body',effects:{dementor:'ineffective',voldemort:'ineffective',malfoy:'overkill'},desc_zh:'束縛咒',desc_en:'Petrify'},
'昏昏倒地':{pinyin:'hūn hūn dǎo dì',pos:'forehead',label_zh:'額頭',label_en:'Forehead',effects:{dementor:'weak',voldemort:'weak',malfoy:'effective'},desc_zh:'昏迷咒',desc_en:'Stun'},
'呼神護衛':{pinyin:'hū shén hù wèi',pos:'defense',label_zh:'自衛',label_en:'Defense',effects:{dementor:'effective',voldemort:'ineffective',malfoy:'ineffective'},desc_zh:'守護咒',desc_en:'Patronus'}
};
const POS_TO_SPELL={wand:'除你武器',body:'統統石化',forehead:'昏昏倒地',defense:'呼神護衛'};

// ========== 狀態 ==========
const state={
score:0,lives:3,currentEnemy:null,currentSpellKey:null,isRecording:false,battleLocked:false,enemyDefeated:false,
enemyHp:0,maxEnemyHp:60,enemyStatus:'default',
xfAppid:'2600b137',xfApiKey:'8b012124ed213c06974cd469f29e134b',xfApiSecret:'MWNkZTQ1ZTEzOTM0NTVjZThjOTQxNjZj',
audioContext:null,processor:null,source:null,stream:null,pcmChunks:[],isCapturing:false,
sampleRate:16000 // 目標採樣率
};

// ========== DOM ==========
const $=id=>document.getElementById(id);
const dom={
score:$('scoreDisplay'),lives:$('livesDisplay'),scoreLabel:$('scoreLabel'),livesLabel:$('livesLabel'),
enemyArea:$('enemyArea'),btnStart:$('btnStart'),posWand:$('posWand'),posBody:$('posBody'),posForehead:$('posForehead'),posDefense:$('posDefense'),
spellDisplay:$('spellDisplay'),spellEmpty:$('spellEmpty'),btnRecord:$('btnRecord'),recordLabel:$('recordLabel'),
feedback:$('feedbackDisplay'),langToggle:$('langToggle'),labelWand:$('labelWand'),labelBody:$('labelBody'),labelForehead:$('labelForehead'),labelDefense:$('labelDefense')
};
const posBtns=[dom.posWand,dom.posBody,dom.posForehead,dom.posDefense];
const posMap={wand:dom.posWand,body:dom.posBody,forehead:dom.posForehead,defense:dom.posDefense};

// ========== 工具 ==========
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[rand(0,a.length-1)];}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function getEnemyName(e){return lang==='zh'?e.name_zh:e.name_en;}
function getEnemyDesc(e){return lang==='zh'?e.desc_zh:e.desc_en;}
function getEnemyHint(e){return lang==='zh'?e.hint_zh:e.hint_en;}
function getSpellDesc(k){let s=SPELLS[k];return lang==='zh'?s.desc_zh:s.desc_en;}
function getSpellEffect(k,eid){let s=SPELLS[k];return s?s.effects[eid]||'ineffective':'ineffective';}
function setFeedback(msg,type='info'){dom.feedback.textContent=msg;dom.feedback.className='feedback '+type;}
function setSpellDisplay(char,pinyin,hint){if(!char){dom.spellDisplay.innerHTML='<div class="spell-empty">'+t('spell_empty')+'</div>';return;}dom.spellDisplay.innerHTML='<div class="spell-char">'+char+'</div><div class="spell-pinyin">'+pinyin+'</div>'+(hint?'<div class="spell-hint">'+hint+'</div>':'');}

// ========== 渲染 ==========
function renderEnemy(){
 let area=dom.enemyArea;
 if(!state.currentEnemy){area.innerHTML='<div class="empty-hint">'+t('enemy_default')+'</div>';return;}
 let e=state.currentEnemy; let name=getEnemyName(e); let desc=getEnemyDesc(e); let hint=getEnemyHint(e);
 let statusMap={'default':0,'expelliarmus':1,'stupefy':2,'petrificus':3,'patronus':4,'attacking':5,'defeated':6};
 let statusNum=statusMap[state.enemyStatus]||0; let imgSrc='images/'+e.id+'_'+statusNum+'.png';
 let statusText=t('enemy_status_'+state.enemyStatus)||t('enemy_status_default');
 let hpPercent=Math.max(0,Math.min(100,(state.enemyHp/state.maxEnemyHp)*100)); let hpClass='high'; if(hpPercent<25)hpClass='low'; else if(hpPercent<55)hpClass='mid';
 area.innerHTML='<div class="enemy-avatar-wrap" id="enemyAvatarWrap"><img class="enemy-img" src="'+imgSrc+'" alt="'+name+'" onerror="this.style.display=\'none\';document.getElementById(\'fallback-emoji-'+e.id+'\').style.display=\'block\';">'+
 '<span id="fallback-emoji-'+e.id+'" style="font-size:4rem;display:none;">'+e.emoji+'</span></div>'+
 '<div class="enemy-name">'+name+'</div><div class="enemy-status">'+statusText+' · '+desc+'</div><div class="enemy-hint">'+hint+'</div>'+
 '<div class="hp-bar-wrap"><div class="hp-bar-fill '+hpClass+'" style="width:'+hpPercent+'%;"></div></div>'+
 '<div class="hp-text">'+t('hp_label')+' '+state.enemyHp+' / '+state.maxEnemyHp+'</div>';
}
function showDamageFloat(amount,isHeal=false,isCritical=false){
 let wrap=document.getElementById('enemyAvatarWrap'); if(!wrap)return;
 let el=document.createElement('div'); el.className='damage-float'; if(isHeal)el.classList.add('heal'); if(isCritical)el.classList.add('critical');
 el.textContent=(isHeal?'+':'-')+Math.abs(amount); wrap.style.position='relative'; wrap.appendChild(el);
 setTimeout(()=>{if(el.parentNode)el.remove();},1400);
}
function setEnemyStatus(s){state.enemyStatus=s;renderEnemy();}
function setEnemyHp(val){state.enemyHp=Math.max(0,Math.min(state.maxEnemyHp,val));renderEnemy();}

function updateUI(){
 dom.score.textContent=state.score; dom.lives.textContent=state.lives; dom.scoreLabel.textContent=t('score'); dom.livesLabel.textContent=t('lives');
 dom.btnStart.textContent=t('start'); dom.recordLabel.textContent=state.isRecording?t('recording'):t('record');
 dom.labelWand.textContent=t('wand'); dom.labelBody.textContent=t('body'); dom.labelForehead.textContent=t('forehead'); dom.labelDefense.textContent=t('defense');
 renderEnemy();
 let hasEnemy=!!state.currentEnemy&&!state.battleLocked&&!state.enemyDefeated;
 posBtns.forEach(b=>b.disabled=!hasEnemy||state.isRecording);
 dom.btnRecord.disabled=!state.currentEnemy||!state.currentSpellKey||state.battleLocked||state.enemyDefeated||state.lives<=0;
 dom.btnStart.disabled=state.isRecording||state.battleLocked;
 if(state.lives<=0){posBtns.forEach(b=>b.disabled=true);dom.btnRecord.disabled=true;dom.btnStart.disabled=false;}
 dom.langToggle.textContent=lang==='zh'?'EN / 中':'中 / EN';
}

// ========== 訊飛簽名 ==========
async function buildWsUrl(apiKey,apiSecret,appid){
 const host='ise-api.xfyun.cn'; const path='/v2/open-ise';
 const date=new Date().toUTCString();
 const signStr='host: '+host+'\n'+'date: '+date+'\n'+'GET '+path+' HTTP/1.1';
 const encoder=new TextEncoder();
 const keyData=encoder.encode(apiSecret); const msgData=encoder.encode(signStr);
 const cryptoKey=await crypto.subtle.importKey('raw',keyData,{name:'HMAC',hash:'SHA-256'},false,['sign']);
 const sigBuffer=await crypto.subtle.sign('HMAC',cryptoKey,msgData);
 const signature=btoa(String.fromCharCode(...new Uint8Array(sigBuffer)));
 const authOrigin='api_key="'+apiKey+'", algorithm="hmac-sha256", headers="host date request-line", signature="'+signature+'"';
 const authBase64=btoa(authOrigin);
 return 'wss://'+host+path+'?authorization='+encodeURIComponent(authBase64)+'&date='+encodeURIComponent(date)+'&host='+encodeURIComponent(host);
}

// ========== 重採樣函數 (將任意採樣率轉為 16kHz) ==========
function resamplePcm(originalPcm, originalRate, targetRate=16000) {
 if(originalRate === targetRate) return originalPcm;
 const ratio = originalRate / targetRate;
 const newLength = Math.round(originalPcm.length / ratio);
 const result = new Int16Array(newLength);
 for(let i=0; i<newLength; i++) {
   const srcPos = i * ratio;
   const idx = Math.floor(srcPos);
   const frac = srcPos - idx;
   if(idx >= originalPcm.length-1) { result[i] = originalPcm[originalPcm.length-1]; }
   else {
     const v1 = originalPcm[idx];
     const v2 = originalPcm[idx+1];
     result[i] = Math.round(v1 + (v2 - v1) * frac);
   }
 }
 return result;
}

// ========== PCM 錄音 (自動重採樣) ==========
function startPCMCapture(){
 return new Promise((resolve,reject)=>{
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}})
  .then(stream=>{
   // 建立 AudioContext (不指定採樣率，使用默認)
   const ctx=new(window.AudioContext||window.webkitAudioContext)();
   const actualRate=ctx.sampleRate;
   console.log('實際採樣率:', actualRate);
   const source=ctx.createMediaStreamSource(stream);
   const processor=ctx.createScriptProcessor(4096,1,1);
   const chunks=[];
   processor.onaudioprocess=(e)=>{
    const data=e.inputBuffer.getChannelData(0);
    const pcm=new Int16Array(data.length);
    for(let i=0;i<data.length;i++){const s=Math.max(-1,Math.min(1,data[i]));pcm[i]=Math.round(s*32767);}
    // 重採樣到 16000
    const resampled = resamplePcm(pcm, actualRate, 16000);
    chunks.push(resampled);
   };
   source.connect(processor); processor.connect(ctx.destination);
   state.audioContext=ctx; state.processor=processor; state.source=source; state.stream=stream; state.pcmChunks=chunks; state.isCapturing=true; state.sampleRate=16000; // 目標採樣率
   resolve();
  }).catch(err=>reject(new Error('麥克風權限被拒絕: '+err.message)));
 });
}
function stopPCMCapture(){
 return new Promise((resolve)=>{
  if(state.audioContext){
   state.source.disconnect(); state.processor.disconnect(); state.stream.getTracks().forEach(t=>t.stop()); state.audioContext.close();
   let total=state.pcmChunks.reduce((a,b)=>a+b.length,0);
   let combined=new Int16Array(total);
   let offset=0; for(let arr of state.pcmChunks){ combined.set(arr,offset); offset+=arr.length; }
   state.isCapturing=false; resolve(combined.buffer);
  }else{ resolve(new Int16Array(0).buffer); }
 });
}

// ========== 訊飛評測 (協議完全合規) ==========
function evaluateWithXunfei(pcmBuffer, appid, apiKey, apiSecret, spellText){
 return new Promise(async (resolve,reject)=>{
  try{
   const url=await buildWsUrl(apiKey,apiSecret,appid);
   console.log('🔗 連線 URL:',url);
   const ws=new WebSocket(url);
   let score=null; let isResolved=false; let accumulatedXml='';
   const timeoutId=setTimeout(()=>{ if(!isResolved&&ws.readyState!==WebSocket.CLOSED){ws.close();reject(new Error('連線逾時 (15秒)'));} },15000);

   ws.onopen=async ()=>{
    console.log('✅ WebSocket 已連線');
    // ssb幀
    const textWithBOM='\uFEFF'+spellText;
    const utf8Bytes=new TextEncoder().encode(textWithBOM);
    let binaryStr=''; for(let i=0;i<utf8Bytes.length;i++) binaryStr+=String.fromCharCode(utf8Bytes[i]);
    const textBase64=btoa(binaryStr);
    const ssb={common:{app_id:appid},business:{category:'read_word',sub:'ise',ent:'cn_vip',tte:'utf-8',cmd:'ssb',auf:'audio/L16;rate=16000',aue:'raw',text:textBase64,ttp_skip:true,rst:'entirety',ise_unite:'1',extra_ability:'multi_dimension'},data:{status:0,data:''}};
    ws.send(JSON.stringify(ssb));
    console.log('📤 發送 ssb 幀 (詞語)');
    const total=pcmBuffer.byteLength;
    if(total===0){ws.close();reject(new Error('音頻數據為空'));return;}
    let offset=0,chunkSize=1280,frameCount=0;
    while(offset<total){
     const end=Math.min(offset+chunkSize,total);
     const chunk=pcmBuffer.slice(offset,end);
     const isLast=(end===total);
     const ausVal=isLast?4:(frameCount===0?1:2);
     const dataStatus=isLast?2:(frameCount===0?0:1);
     const chunkBinary=String.fromCharCode.apply(null,new Uint8Array(chunk));
     const frame={business:{cmd:'auw',aus:ausVal,aue:'raw'},data:{status:dataStatus,data:btoa(chunkBinary)}};
     ws.send(JSON.stringify(frame));
     frameCount++; offset=end;
     await sleep(40);
    }
    console.log('📤 發送音頻幀數:',frameCount,'總字節:',total);
   };

   ws.onmessage=(ev)=>{
    try{
     const msg=JSON.parse(ev.data);
     console.log('📩 收到訊息:',msg);
     if(msg.code!==0){clearTimeout(timeoutId);isResolved=true;reject(new Error('訊飛錯誤 ['+msg.code+']: '+msg.message));ws.close();return;}
     if(msg.data&&msg.data.data){
      const xmlStr=atob(msg.data.data);
      accumulatedXml+=xmlStr;
      let match=accumulatedXml.match(/<read_word[^>]*total_score="([\d.]+)"/);
      if(!match) match=accumulatedXml.match(/<sentence[^>]*total_score="([\d.]+)"/);
      if(!match) match=accumulatedXml.match(/total_score value="([\d.]+)"/);
      if(match){ score=parseFloat(match[1]); clearTimeout(timeoutId); isResolved=true; ws.close(); resolve(score); return; }
     }
     if(msg.data&&msg.data.status===2){ clearTimeout(timeoutId); isResolved=true; ws.close(); resolve(score!==null?score:0); }
    }catch(e){ clearTimeout(timeoutId); isResolved=true; reject(new Error('解析回應失敗: '+e.message)); }
   };
   ws.onerror=(err)=>{ clearTimeout(timeoutId); if(!isResolved){ isResolved=true; reject(new Error('WebSocket 連線失敗: '+err.message)); } };
   ws.onclose=(ev)=>{ clearTimeout(timeoutId); if(!isResolved){ isResolved=true; if(score!==null) resolve(score); else reject(new Error('連線中斷 (code:'+ev.code+')')); } };
  }catch(e){ reject(e); }
 });
}

// ========== 戰鬥核心 ==========
function startAdventure(){
 if(state.battleLocked||state.isRecording)return;
 if(state.lives<=0){ state.lives=3; state.score=0; state.battleLocked=false; state.enemyDefeated=false; state.currentEnemy=null; state.currentSpellKey=null; setSpellDisplay(null); posBtns.forEach(b=>b.classList.remove('active')); setFeedback(t('feedback_restart'),'info'); updateUI(); }
 const enemy=pick(ENEMIES);
 state.currentEnemy=enemy; state.currentSpellKey=null; state.enemyDefeated=false; state.battleLocked=false; state.enemyStatus='default'; state.enemyHp=enemy.hp; state.maxEnemyHp=enemy.hp;
 setSpellDisplay(null); setFeedback(t('feedback_encounter',{name:getEnemyName(enemy)}),'info'); posBtns.forEach(b=>b.classList.remove('active')); updateUI(); posBtns.forEach(b=>b.disabled=false); dom.btnRecord.disabled=true; setEnemyStatus('default'); renderEnemy();
}
function selectPosition(posKey){
 if(!state.currentEnemy||state.battleLocked||state.isRecording||state.enemyDefeated)return;
 const spellKey=POS_TO_SPELL[posKey]; if(!spellKey)return;
 state.currentSpellKey=spellKey; posBtns.forEach(b=>b.classList.remove('active')); const btn=posMap[posKey]; if(btn)btn.classList.add('active');
 setSpellDisplay(spellKey,SPELLS[spellKey].pinyin,'「'+getSpellDesc(spellKey)+'」'); setFeedback(t('feedback_spell_ready',{spell:spellKey}),'info'); dom.btnRecord.disabled=false; updateUI();
}

async function handleRecord(){
 if(!state.currentEnemy||!state.currentSpellKey||state.battleLocked||state.enemyDefeated)return;
 const spellKey=state.currentSpellKey; const enemy=state.currentEnemy;
 if(!state.isRecording){
  state.isRecording=true; dom.btnRecord.classList.add('recording'); dom.recordLabel.textContent=t('recording'); setFeedback(t('feedback_listening'),'info'); updateUI();
  try{ await startPCMCapture(); }catch(err){ setFeedback(t('feedback_fail',{err:err.message}),'fail'); state.isRecording=false; dom.btnRecord.classList.remove('recording'); dom.recordLabel.textContent=t('record'); updateUI(); }
 }else{
  dom.btnRecord.disabled=true; state.isRecording=false; dom.btnRecord.classList.remove('recording'); dom.recordLabel.textContent=t('record'); setFeedback(t('feedback_stopping'),'info'); updateUI();
  try{
   const pcmBuffer=await stopPCMCapture();
   if(pcmBuffer.byteLength===0){ setFeedback('❌ 未錄到音頻，請重新嘗試','fail'); updateUI(); return; }
   setFeedback(t('feedback_connecting'),'info'); dom.btnRecord.disabled=true; posBtns.forEach(b=>b.disabled=true);
   const score=await evaluateWithXunfei(pcmBuffer,state.xfAppid,state.xfApiKey,state.xfApiSecret,spellKey);
   setFeedback(t('feedback_score',{score:score}),'info');
   const effect=getSpellEffect(spellKey,enemy.id);
   await handleBattleResult(effect,spellKey,enemy,score);
  }catch(err){ setFeedback(t('feedback_fail',{err:err.message}),'fail'); await sleep(1500); await handleCounterAttack(); }
  finally{ if(!state.battleLocked&&!state.enemyDefeated&&state.lives>0){ posBtns.forEach(b=>b.disabled=false); dom.btnRecord.disabled=!state.currentSpellKey; } updateUI(); }
 }
}
function resetBattleTurn(enemy){ state.battleLocked=false; state.currentSpellKey=null; setSpellDisplay(null); posBtns.forEach(b=>b.classList.remove('active')); setFeedback(t('feedback_retry',{name:getEnemyName(enemy)}),'info'); updateUI(); posBtns.forEach(b=>b.disabled=false); dom.btnRecord.disabled=true; setEnemyStatus('default'); renderEnemy(); }

async function handleBattleResult(effect,spellKey,enemy,score){
 state.battleLocked=true; let damage=0,isKill=false,bonusMsg='',bonusPts=0,isCritical=false;
 switch(effect){
  case 'effective': damage=Math.round(score); if(damage>=60){isKill=true;isCritical=true;bonusPts=(score>=90?5:(score>=75?2:0));bonusMsg=bonusPts>0?(score>=90?t('bonus_perfect'):t('bonus_great')):'';} break;
  case 'weak': damage=Math.round(score*0.5); break;
  case 'ineffective': damage=0; break;
  case 'overkill': damage=Math.round(score*5); state.score=Math.max(0,state.score-5); break;
 }
 const actualDamage=Math.min(damage,state.enemyHp); const newHp=Math.max(0,state.enemyHp-actualDamage); const hpLost=state.enemyHp-newHp;
 if(hpLost>0) showDamageFloat(hpLost,false,isCritical||(effect==='overkill')); else if(effect==='ineffective') showDamageFloat(0,false,false);
 state.enemyHp=newHp; renderEnemy();
 const statusMap={'除你武器':'expelliarmus','昏昏倒地':'stupefy','統統石化':'petrificus','呼神護衛':'patronus'}; setEnemyStatus(statusMap[spellKey]||'default');
 await sleep(1200);
 if(state.enemyHp<=0||isKill){
  state.score+=10+bonusPts; setFeedback(t('feedback_victory',{name:getEnemyName(enemy),score:10+bonusPts,bonus:bonusMsg}),'success');
  state.enemyDefeated=true; setEnemyStatus('defeated'); state.currentEnemy=null; state.currentSpellKey=null; setSpellDisplay(null); posBtns.forEach(b=>b.classList.remove('active')); updateUI();
  await sleep(1500); if(state.lives>0){ setFeedback(t('feedback_next'),'info'); startAdventure(); } else { setFeedback(t('feedback_gameover'),'fail'); }
  return;
 }
 if(effect==='effective'){ await handleCounterAttack(); }
 else if(effect==='weak'){ if(Math.random()<0.5){ setFeedback(t('feedback_dodge'),'success'); await sleep(1500); resetBattleTurn(enemy); } else { setFeedback(t('feedback_dodge_fail'),'fail'); await sleep(1500); await handleCounterAttack(); } }
 else if(effect==='ineffective'||effect==='overkill'){ if(effect==='ineffective') setFeedback(t('feedback_ineffective',{spell:spellKey,enemy:getEnemyName(enemy)}),'fail'); else { setFeedback(t('feedback_overkill',{spell:spellKey}),'warn'); setFeedback(t('feedback_overkill_penalty'),'warn'); } await sleep(1500); await handleCounterAttack(); }
}
async function handleCounterAttack(){
 if(state.lives<=0)return; state.lives-=1; setEnemyStatus('attacking'); setFeedback(t('feedback_hit',{lives:state.lives}),'fail'); updateUI(); showDamageFloat(1,false,false); await sleep(1500);
 if(state.lives<=0){ setFeedback(t('feedback_gameover'),'fail'); state.battleLocked=true; state.enemyDefeated=true; state.currentEnemy=null; state.currentSpellKey=null; setSpellDisplay(null); posBtns.forEach(b=>b.classList.remove('active')); updateUI(); dom.btnStart.disabled=false; setEnemyStatus('defeated'); renderEnemy(); return; }
 resetBattleTurn(state.currentEnemy);
}

// ========== 初始化 ==========
function init(){
 try{ const saved=localStorage.getItem('hp_spell_config'); if(saved){const cfg=JSON.parse(saved); if(cfg.lang)lang=cfg.lang;} }catch(e){}
 dom.langToggle.addEventListener('click',()=>{ lang=(lang==='zh')?'en':'zh'; try{ localStorage.setItem('hp_spell_config',JSON.stringify({lang:lang})); }catch(e){} updateUI(); if(state.currentSpellKey){ const s=SPELLS[state.currentSpellKey]; if(s)setSpellDisplay(state.currentSpellKey,s.pinyin,'「'+getSpellDesc(state.currentSpellKey)+'」'); } if(!state.currentEnemy)setFeedback(t('feedback_wait'),'info'); else setFeedback(t('feedback_encounter',{name:getEnemyName(state.currentEnemy)}),'info'); });
 dom.btnStart.addEventListener('click',startAdventure);
 dom.posWand.addEventListener('click',()=>selectPosition('wand'));
 dom.posBody.addEventListener('click',()=>selectPosition('body'));
 dom.posForehead.addEventListener('click',()=>selectPosition('forehead'));
 dom.posDefense.addEventListener('click',()=>selectPosition('defense'));
 dom.btnRecord.addEventListener('click',handleRecord);
 updateUI(); setFeedback(t('feedback_wait'),'info');
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();
